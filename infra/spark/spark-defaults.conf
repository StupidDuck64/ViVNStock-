# Network Configuration
spark.driver.bindAddress                0.0.0.0
spark.blockManager.port                 0
spark.network.timeout                   800s
spark.rpc.askTimeout                    600s
spark.sql.broadcastTimeout              36000

# Dynamic Allocation Configuration
spark.dynamicAllocation.enabled         false
spark.shuffle.service.enabled           false

# UI Configuration
spark.ui.enabled                        true
spark.ui.port                           4040

# Executor Configuration  
spark.executor.instances                2
spark.executor.cores                    1
spark.executor.memory                   512m
spark.executor.memoryFraction           0.8
spark.driver.memory                     512m
spark.driver.maxResultSize              256m

# Serialization
spark.serializer                        org.apache.spark.serializer.KryoSerializer

# SQL Configuration
spark.sql.adaptive.enabled              true
spark.sql.adaptive.coalescePartitions.enabled  true

# Hive Metastore Configuration
spark.sql.catalogImplementation            hive
spark.hadoop.hive.metastore.uris           thrift://hive-metastore:9083
spark.sql.warehouse.dir                    s3a://iceberg/warehouse
spark.sql.hive.metastore.version           3.1.3
spark.sql.hive.metastore.jars              /opt/bitnami/spark/jars/*

# Iceberg Catalog Configuration
spark.sql.catalog.iceberg                  org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.iceberg.type             hive
spark.sql.catalog.iceberg.uri              thrift://hive-metastore:9083
spark.sql.catalog.iceberg.warehouse        s3a://iceberg/warehouse
spark.sql.catalog.iceberg.io-impl          org.apache.iceberg.aws.s3.S3FileIO

# Default catalog
spark.sql.defaultCatalog                   iceberg

# AWS Configuration for MinIO/S3
spark.hadoop.fs.s3a.aws.credentials.provider  org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider
spark.hadoop.fs.s3a.endpoint            http://minio:9000
spark.hadoop.fs.s3a.path.style.access   true
spark.hadoop.fs.s3a.connection.ssl.enabled  false
spark.hadoop.fs.s3a.impl                org.apache.hadoop.fs.s3a.S3AFileSystem
spark.sql.catalog.iceberg.s3.region     us-east-1
spark.sql.catalog.iceberg.s3.endpoint   http://minio:9000
spark.sql.catalog.iceberg.s3.path-style-access  true
spark.hadoop.fs.s3a.bucket.all.committer.magic.enabled  false

# AWS SDK Configuration
spark.driver.extraJavaOptions           -Daws.region=us-east-1 -Dsoftware.amazon.awssdk.http.service.impl=software.amazon.awssdk.http.urlconnection.UrlConnectionSdkHttpService
spark.executor.extraJavaOptions         -Daws.region=us-east-1 -Dsoftware.amazon.awssdk.http.service.impl=software.amazon.awssdk.http.urlconnection.UrlConnectionSdkHttpService

# JDBC Driver Configuration
spark.driver.extraClassPath             /opt/bitnami/spark/jars/ojdbc8.jar:/opt/bitnami/spark/jars/clickhouse-jdbc-0.8.5-all.jar
spark.executor.extraClassPath           /opt/bitnami/spark/jars/ojdbc8.jar:/opt/bitnami/spark/jars/clickhouse-jdbc-0.8.5-all.jar
spark.sql.catalog.oracle_db             org.apache.spark.sql.execution.datasources.v2.jdbc.JDBCTableCatalog
spark.sql.catalog.oracle_db.url         jdbc:oracle:thin:@//192.168.26.180:1521/dbpdb
spark.sql.catalog.oracle_db.driver      oracle.jdbc.driver.OracleDriver
spark.sql.catalog.clickhouse            org.apache.spark.sql.execution.datasources.v2.jdbc.JDBCTableCatalog
spark.sql.catalog.clickhouse.url        jdbc:clickhouse://clickhouse:8123/default
spark.sql.catalog.clickhouse.driver     com.clickhouse.jdbc.ClickHouseDriver
