server {
    listen 80;
    server_name _;

    # Docker internal DNS resolver
    resolver 127.0.0.11 valid=30s;

    # --- Buffers for large headers (OAuth2 cookies) ---
    large_client_header_buffers 4 32k;
    client_header_buffer_size   16k;
    proxy_buffer_size           128k;
    proxy_buffers               4 256k;
    proxy_busy_buffers_size     256k;

    # --- Portal static files root ---
    root  /usr/share/nginx/html;
    index index.html;

    # --- Security headers ---
    add_header X-Frame-Options        "SAMEORIGIN"  always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header X-XSS-Protection       "1; mode=block" always;

    # ── Health check (Docker HEALTHCHECK, no auth needed) ──
    location = /health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }

    # ── OAuth2 Proxy endpoints (no auth_request on these!) ──
    location = /oauth2/auth {
        internal;
        set $u_oauth2 "http://oauth2-proxy:4180";
        proxy_pass       $u_oauth2;
        proxy_set_header Host             $host;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Scheme         $scheme;
        proxy_set_header Content-Length   "";
        proxy_pass_request_body           off;
    }

    location /oauth2/ {
        set $u_oauth2 "http://oauth2-proxy:4180";
        proxy_pass       $u_oauth2;
        proxy_set_header Host                    $host;
        proxy_set_header X-Real-IP               $remote_addr;
        proxy_set_header X-Scheme                $scheme;
        proxy_set_header X-Auth-Request-Redirect $request_uri;
    }

    # Unauthenticated → redirect to Keycloak login
    error_page 401 = /oauth2/sign_in;

    # ── Airflow: bypass subpath proxy (Airflow 3 SPA limitation) ──
    # Redirects /airflow/* to Airflow's native port using the browser's own host,
    # so it works on both localhost and LAN IPs.
    location ^~ /airflow/ {
        # Replace host header value with $http_host so LAN IPs are preserved
        return 302 http://$http_host:8085/;
    }

    # ── Keycloak proxy (so OAuth2 Proxy can reach it via /auth/) ──
    location /auth/ {
        set $u_kc "http://keycloak:8080/";
        proxy_pass         $u_kc;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffer_size          128k;
        proxy_buffers              4 256k;
        proxy_busy_buffers_size    256k;
    }

    # ── Static assets: disable aggressive caching to prevent stale JS ──
    location ~* \.(css|js)$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri =404;
    }

    location ~* \.(png|jpg|svg|ico|woff2?)$ {
        expires 1d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # ── Health-check API proxy endpoints (no auth needed for health) ──
    location /api/health/airflow {
        set $u "http://airflow-apiserver:8080/api/v2/version";
        proxy_pass $u;
        proxy_connect_timeout 3s;
        proxy_read_timeout    3s;
    }
    location /api/health/minio {
        set $u "http://minio:9000/minio/health/live";
        proxy_pass $u;
        proxy_connect_timeout 3s;
        proxy_read_timeout    3s;
    }
    location /api/health/clickhouse {
        set $u "http://clickhouse-01:8123/ping";
        proxy_pass $u;
        proxy_connect_timeout 3s;
        proxy_read_timeout    3s;
    }
    location /api/health/trino {
        set $u "http://trino:8080/v1/info";
        proxy_pass $u;
        proxy_connect_timeout 3s;
        proxy_read_timeout    3s;
    }
    location /api/health/superset {
        set $u "http://superset:8088/health";
        proxy_pass $u;
        proxy_connect_timeout 3s;
        proxy_read_timeout    3s;
    }
    location /api/health/grafana {
        set $u "http://grafana:3000/api/health";
        proxy_pass $u;
        proxy_connect_timeout 3s;
        proxy_read_timeout    3s;
    }
    location /api/health/prometheus {
        set $u "http://prometheus:9090/-/healthy";
        proxy_pass $u;
        proxy_connect_timeout 3s;
        proxy_read_timeout    3s;
    }
    location /api/health/vault {
        set $u "http://vault:8200/v1/sys/health";
        proxy_pass $u;
        proxy_connect_timeout 3s;
        proxy_read_timeout    3s;
    }
    location /api/health/kafka-ui {
        set $u "http://kafka-ui:8080/actuator/health";
        proxy_pass $u;
        proxy_connect_timeout 3s;
        proxy_read_timeout    3s;
    }
    location /api/health/schema-registry {
        set $u "http://schema-registry:8081/";
        proxy_pass $u;
        proxy_connect_timeout 3s;
        proxy_read_timeout    3s;
    }
    location /api/health/debezium {
        set $u "http://debezium:8083/";
        proxy_pass $u;
        proxy_connect_timeout 3s;
        proxy_read_timeout    3s;
    }
    location /api/health/elasticsearch {
        set $u "http://es01:9200/_cluster/health";
        proxy_pass $u;
        proxy_connect_timeout 3s;
        proxy_read_timeout    3s;
    }
    location /api/health/flink {
        set $u "http://flink-jobmanager:8081/";
        proxy_pass $u;
        proxy_connect_timeout 3s;
        proxy_read_timeout    3s;
    }
    location /api/health/spark-master {
        set $u "http://spark-master:8080/";
        proxy_pass $u;
        proxy_connect_timeout 3s;
        proxy_read_timeout    3s;
    }
    location /api/health/jupyterlab {
        set $u "http://jupyterlab:8888/api/status";
        proxy_pass $u;
        proxy_connect_timeout 3s;
        proxy_read_timeout    3s;
    }
    location /api/health/nifi {
        set $u "http://nifi:8443/nifi-api/system-diagnostics";
        proxy_pass $u;
        proxy_connect_timeout 3s;
        proxy_read_timeout    3s;
    }
    location /api/health/keycloak {
        set $u "http://keycloak:8080/health/ready";
        proxy_pass $u;
        proxy_connect_timeout 3s;
        proxy_read_timeout    3s;
    }
    location /api/health/ranger {
        set $u "http://ranger-admin:6080/service/public/v2/api/servicedef";
        proxy_pass $u;
        proxy_connect_timeout 3s;
        proxy_read_timeout    3s;
    }

    # ── Protected Portal UI (auth_request guards this block) ──
    location / {
        auth_request /oauth2/auth;

        auth_request_set $user  $upstream_http_x_auth_request_user;
        auth_request_set $email $upstream_http_x_auth_request_email;
        proxy_set_header X-User  $user;
        proxy_set_header X-Email $email;

        try_files $uri $uri/ /index.html;
    }
}
