<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FSS Lakehouse — Data Platform Portal</title>
  <meta name="description" content="FSS Lakehouse Data Platform Portal — Committed. Professional. Understanding." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <!-- ===================== TOP NAV ===================== -->
  <nav class="topnav" id="topnav">
    <div class="topnav__brand">
      <img class="topnav__logo" src="logo.png" alt="FSS Lakehouse Data Platform" />
      <span class="topnav__title">FSS <span class="accent">Lakehouse</span></span>
    </div>
    <div class="topnav__actions">
      <div class="search-box" id="searchBox">
        <svg class="search-icon" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd"
            d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z"
            clip-rule="evenodd" />
        </svg>
        <input type="text" id="searchInput" placeholder="Tìm service…" autocomplete="off" />
      </div>
      <div class="user-info" id="userInfo" style="display:none;">
        <div class="user-avatar" id="userAvatar">U</div>
        <span class="user-name" id="userName"></span>
        <button class="btn btn--ghost" id="logoutBtn" title="Đăng xuất">
          <svg viewBox="0 0 20 20" fill="currentColor" width="18" height="18">
            <path fill-rule="evenodd"
              d="M3 3a1 1 0 00-1 1v12a1 1 0 001 1h12a1 1 0 001-1V4a1 1 0 00-1-1H3zm7.707 4.293a1 1 0 010 1.414L9.414 10l1.293 1.293a1 1 0 01-1.414 1.414l-2-2a1 1 0 010-1.414l2-2a1 1 0 011.414 0z"
              clip-rule="evenodd" />
            <path fill-rule="evenodd" d="M14 10a1 1 0 01-1 1H7a1 1 0 110-2h6a1 1 0 011 1z" clip-rule="evenodd" />
          </svg>
        </button>
      </div>
      <div class="login-prompt" id="loginPrompt">
        <button class="btn btn--primary" id="loginBtn">Đăng nhập</button>
      </div>
    </div>
  </nav>

  <!-- ===================== HERO ===================== -->
  <header class="hero">
    <div class="hero__content">
      <h1 class="hero__title">Data Platform Portal</h1>
      <p class="hero__subtitle">Committed · Professional · Understanding</p>
    </div>
    <div class="hero__stats" id="heroStats">
      <div class="stat-card">
        <span class="stat-card__value" id="totalServices">0</span>
        <span class="stat-card__label">Dịch vụ</span>
      </div>
      <div class="stat-card stat-card--ok">
        <span class="stat-card__value" id="healthyServices">—</span>
        <span class="stat-card__label">Healthy</span>
      </div>
      <div class="stat-card stat-card--warn">
        <span class="stat-card__value" id="downServices">—</span>
        <span class="stat-card__label">Down</span>
      </div>
    </div>
  </header>

  <!-- ===================== CATEGORY FILTERS ===================== -->
  <section class="filters" id="filters">
    <button class="filter-chip active" data-category="all">Tất cả</button>
    <button class="filter-chip" data-category="database">Databases</button>
    <button class="filter-chip" data-category="iam">IAM & Security</button>
    <button class="filter-chip" data-category="orchestration">Orchestration</button>
    <button class="filter-chip" data-category="streaming">Streaming</button>
    <button class="filter-chip" data-category="monitoring">Monitoring</button>
    <button class="filter-chip" data-category="explore">Explore & BI</button>
  </section>

  <!-- ===================== SERVICES GRID ===================== -->
  <main class="services-grid" id="servicesGrid">
    <!-- Cards are rendered dynamically by app.js -->
  </main>

  <!-- ===================== FOOTER ===================== -->
  <footer class="footer">
    <p>FSS Lakehouse Data Platform &copy; 2026 — Committed · Professional · Understanding</p>
  </footer>

  <script src="app.js?v=3"></script>
</body>

</html>
