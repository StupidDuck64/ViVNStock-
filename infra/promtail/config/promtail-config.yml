server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    batchwait: 1s
    batchsize: 1048576

scrape_configs:
  # ── VNStock Producer logs ─────────────────────────────────────
  - job_name: vnstock-producer
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: name
            values: [".*vnstock-producer.*"]
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/?(.*)'
        target_label: container
      - target_label: job
        replacement: vnstock-producer
    pipeline_stages:
      - regex:
          expression: '(?P<level>INFO|WARN|ERROR|DEBUG|CRITICAL)'
      - labels:
          level:

  # ── Spark Master/Worker logs ──────────────────────────────────
