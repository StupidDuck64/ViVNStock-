## OAuth2 Proxy configuration for Flink with Keycloak

# HTTP configuration
http_address = "0.0.0.0:4180"
https_address = ""

# Upstream configuration - Flink JobManager Web UI
upstreams = [
    "http://flink-jobmanager:8081"
]

# Email domains to allow (use * for all)
email_domains = [
    "*"
]

# Keycloak OIDC provider configuration
provider = "keycloak-oidc"
provider_display_name = "Keycloak"

# Keycloak URLs
oidc_issuer_url = "http://keycloak:8080/realms/data-platform"
login_url = "http://localhost:8084/realms/data-platform/protocol/openid-connect/auth"
redeem_url = "http://keycloak:8080/realms/data-platform/protocol/openid-connect/token"
profile_url = "http://keycloak:8080/realms/data-platform/protocol/openid-connect/userinfo"
validate_url = "http://keycloak:8080/realms/data-platform/protocol/openid-connect/userinfo"

# Client credentials (will be overridden by environment variables)
client_id = "flink"
client_secret = "CHANGE_ME_FLINK_SECRET"

# OAuth2 Proxy URLs
redirect_url = "http://localhost:8096/oauth2/callback"

# Cookie configuration
cookie_name = "_oauth2_proxy_flink"
cookie_secret = "CHANGE_ME_COOKIE_SECRET_32_CHARS"
cookie_secure = false
cookie_httponly = true
cookie_expire = "168h"
cookie_refresh = "60m"
cookie_samesite = "lax"

# Session configuration
session_cookie_minimal = false

# Request configuration
pass_access_token = true
pass_authorization_header = true
pass_user_headers = true
set_authorization_header = true
set_xauthrequest = true

# Scope
scope = "openid email profile roles groups"

# Skip provider TLS verification (for development only)
ssl_insecure_skip_verify = true
insecure_oidc_allow_unverified_email = true
insecure_oidc_skip_issuer_verification = true
skip_oidc_discovery = false
oidc_email_claim = "email"
skip_jwt_bearer_tokens = true

# Reverse proxy configuration
reverse_proxy = true
real_client_ip_header = "X-Real-IP"
upstream_timeout = "180s"
flush_interval = "1s"

# Skip auth for static assets
skip_auth_regex = [
    "^/assets/.*",
    "^/.*\\.js$",
    "^/.*\\.css$",
    "^/.*\\.svg$",
    "^/.*\\.png$",
    "^/.*\\.ico$",
    "^/.*\\.woff2?$",
    "^/.*\\.ttf$",
    "^/.*\\.eot$"
]

# Whitelist domains
whitelist_domains = [
    ".localhost",
    "localhost:8096",
    "flink-jobmanager:8081"
]

# Logging
request_logging = true
auth_logging = true
standard_logging = true
