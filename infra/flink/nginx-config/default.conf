server {
    listen       8443 ssl;
    listen       [::]:8443 ssl;
    http2        on;
    server_name  localhost;
    
    # Self-signed certificate (for development)
    # In production, use certificates from a trusted CA
    ssl_certificate /etc/nginx/ssl/nginx.crt;   
    ssl_certificate_key /etc/nginx/ssl/nginx.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    
    # OIDC Authentication using lua-resty-openidc
    access_by_lua_block {
        -- Skip authentication for health check
        if ngx.var.request_uri == "/health" then
            return
        end
        
        local opts = {
            redirect_uri = os.getenv("OIDC_REDIRECT_URI") or "http://localhost:8096/redirect_uri",
            discovery = os.getenv("OIDC_DISCOVERY") or "http://keycloak:8080/realms/data-platform/.well-known/openid-configuration",
            client_id = os.getenv("OIDC_CLIENT_ID") or "flink-client",
            client_secret = os.getenv("OIDC_CLIENT_SECRET"),
            logout_path = "/logout",
            accept_none_alg = false,
            accept_unsupported_alg = false,
            session_contents = {
                id_token = true,
                user = true,
                access_token = true
            },
            scope = "openid email profile roles",
            -- Session settings
            renew_access_token_on_expiry = true,
            access_token_expires_in = 3600,
            -- SSL verification
            ssl_verify = "no"  -- Set to "yes" in production with proper CA certs
        }
        
        -- Authenticate using OIDC
        local res, err = require("resty.openidc").authenticate(opts)
        
        if err then
            ngx.status = 403
            ngx.log(ngx.ERR, "OIDC authentication failed: ", err)
            ngx.header["Content-Type"] = "text/html"
            ngx.say([[
                <html>
                <head><title>Authentication Failed</title></head>
                <body>
                    <h1>Authentication Failed</h1>
                    <p>]] .. err .. [[</p>
                    <p><a href="/">Try again</a></p>
                </body>
                </html>
            ]])
            ngx.exit(ngx.HTTP_FORBIDDEN)
        end
        
        -- Set user info headers for upstream
        if res and res.user then
            ngx.req.set_header("X-Auth-User", res.user.preferred_username or res.user.sub)
            ngx.req.set_header("X-Auth-Email", res.user.email or "")
            ngx.req.set_header("X-Auth-Name", res.user.name or "")
            
            -- Optional: Check roles for authorization
            -- Uncomment to enable role-based access control
            --[[
            if res.user.realm_access and res.user.realm_access.roles then
                local has_permission = false
                local required_roles = {"flink-admin", "flink-developer", "platform-admin"}
                
                for _, user_role in ipairs(res.user.realm_access.roles) do
                    for _, required_role in ipairs(required_roles) do
                        if user_role == required_role then
                            has_permission = true
                            break
                        end
                    end
                    if has_permission then break end
                end
                
                if not has_permission then
                    ngx.status = 403
                    ngx.log(ngx.ERR, "User does not have required role")
                    ngx.header["Content-Type"] = "text/html"
                    ngx.say([[
                        <html>
                        <head><title>Access Denied</title></head>
                        <body>
                            <h1>Access Denied</h1>
                            <p>You do not have permission to access Flink Web UI.</p>
                            <p>Required roles: flink-admin, flink-developer, or platform-admin</p>
                            <p><a href="/logout">Logout</a></p>
                        </body>
                        </html>
                    ]])
                    ngx.exit(ngx.HTTP_FORBIDDEN)
                end
            end
            --]]
        end
    }
    
    # Proxy to Flink JobManager
    location / {
        set $flink_upstream '';
        
        access_by_lua_block {
            ngx.var.flink_upstream = os.getenv("FLINK_JOBMANAGER_URL") or "http://flink-jobmanager:8081"
        }
        
        proxy_pass $flink_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # WebSocket support for Flink UI live updates
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
        
        # Buffering
        proxy_buffering off;
        proxy_request_buffering off;
    }
    
    # Health check endpoint (no auth required)
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
    
    # Logout endpoint
    location /logout {
        access_by_lua_block {
            local opts = {
                redirect_uri = os.getenv("OIDC_REDIRECT_URI") or "http://localhost:8096/redirect_uri",
                discovery = os.getenv("OIDC_DISCOVERY") or "http://keycloak:8080/realms/data-platform/.well-known/openid-configuration",
                client_id = os.getenv("OIDC_CLIENT_ID") or "flink-client",
                client_secret = os.getenv("OIDC_CLIENT_SECRET"),
                post_logout_redirect_uri = os.getenv("OIDC_REDIRECT_URI") or "http://localhost:8096/",
                ssl_verify = "no"
            }
            
            require("resty.openidc").logout(opts)
        }
    }
}
