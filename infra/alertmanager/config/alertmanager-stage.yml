# ════════════════════════════════════════════════════════════════════════════════
# Alertmanager — Production Configuration
# Routing: Critical → webhook-critical | Warning → webhook-warning
# To enable Telegram/Slack: replace webhook receivers with real configs
# ════════════════════════════════════════════════════════════════════════════════
global:
  resolve_timeout: 5m

# ── Inhibition: Critical suppresses Warning for same alertname ──
inhibit_rules:
  - source_matchers: [severity="critical"]
    target_matchers: [severity="warning"]
    equal: [alertname]

# ── Route tree ──
route:
  receiver: "default"
  group_by: ["alertname", "team"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

  routes:
    # Critical alerts
    - matchers:
        - severity="critical"
      receiver: "critical"
      group_wait: 10s
      repeat_interval: 1h

    # Warning alerts
    - matchers:
        - severity="warning"
      receiver: "warning"
      repeat_interval: 4h

# ── Receivers ──
# Default: log to stdout (visible via `docker logs alertmanager`)
# To enable Telegram: uncomment telegram_configs and add bot_token + chat_id
# To enable Slack: uncomment slack_configs and add api_url
receivers:
  - name: "default"
    webhook_configs:
      - send_resolved: true
        url: "http://localhost:9093/-/healthy"

  - name: "critical"
    webhook_configs:
      - send_resolved: true
        url: "http://localhost:9093/-/healthy"
    # ── Uncomment to enable Telegram ──
