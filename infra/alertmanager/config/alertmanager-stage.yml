route:
  receiver: 'Mail Alert'
  group_by: [ 'alertname' ]
  repeat_interval: 1m
  group_wait: 15s
  group_interval: 5m

receivers:
  - name: 'Mail Alert'
    email_configs:
      - smarthost: 'smtp.gmail.com:587'
        auth_username: '<EMAIL_ADDRESS>'
        auth_password: "<APP_PASSWORDS>"
        from: '<EMAIL_ADDRESS>'
        to: '<EMAIL_ADDRESS>'
        headers:
          subject: 'Prometheus Mail Alerts'
        
