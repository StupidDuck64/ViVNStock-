# ═══════════════════════════════════════════════════════════
# VVS Frontend — nginx reverse proxy
# ═══════════════════════════════════════════════════════════
# - SPA fallback (React Router)
# - Reverse proxy /api/ → vnstock-api:8000 (FastAPI)
# - WebSocket upgrade support (for /api/ws/stream)
# - Gzip compression for JS/CSS bundles
# - Static asset caching (1 year, immutable)
# - RAM-optimized: worker_processes 1, small buffers
# ═══════════════════════════════════════════════════════════

# RAM optimization: 1 worker × 512 connections = đủ cho dashboard nội bộ
# (nginx master + 1 worker ≈ 5-10MB RAM)
worker_processes 1;
worker_rlimit_nofile 1024;

events {
    worker_connections 512;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging — minimal format to save I/O
    log_format compact '$remote_addr $request_method $uri $status $body_bytes_sent';
    access_log /var/log/nginx/access.log compact;
    error_log  /var/log/nginx/error.log warn;

    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;

    keepalive_timeout 65;
    types_hash_max_size 2048;

    # ─── Gzip compression ──────────────────────────────
    # React build output: main.js ~200KB → ~60KB gzipped
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ─── Buffer sizes (nhỏ, tiết kiệm RAM) ────────────
    client_body_buffer_size 16k;
    client_max_body_size 1m;
    proxy_buffer_size 8k;
    proxy_buffers 4 16k;

    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # ─── SPA fallback (React history mode) ────────
        location / {
            try_files $uri $uri/ /index.html;
        }

        # ─── Reverse proxy: REST API ──────────────────
        location /api/ {
            proxy_pass http://vnstock-api:8000;
            proxy_http_version 1.1;

            # WebSocket upgrade headers
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Forward client info
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts cho WebSocket long-lived connections
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;

            # Disable buffering for WebSocket streaming
            proxy_buffering off;
        }

        # ─── Cache static assets (JS/CSS/images) ─────
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # ─── Security headers ─────────────────────────
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }
}
