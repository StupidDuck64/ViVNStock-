  # ==============================================================================================
  # SCRAPE MINIO V2 METRICS
  # ==============================================================================================
  - job_name: "minio_cluster"
    metrics_path: /minio/v2/metrics/cluster
    static_configs:
      - targets: ["minio:9000"]
    bearer_token: "<YOUR_MINIO_PROMETHEUS_BEARER_TOKEN>"

  - job_name: "minio_bucket"
    metrics_path: /minio/v2/metrics/bucket
    static_configs:
      - targets: ["minio:9000"]
    bearer_token: "<YOUR_MINIO_PROMETHEUS_BEARER_TOKEN>"

  - job_name: "minio_resource"
    metrics_path: /minio/v2/metrics/resource
    static_configs:
      - targets: ["minio:9000"]
    bearer_token: "<YOUR_MINIO_PROMETHEUS_BEARER_TOKEN>"

  - job_name: "minio_node"
    metrics_path: /minio/v2/metrics/node
    static_configs:
      - targets: ["minio:9000"]
    bearer_token: "<YOUR_MINIO_PROMETHEUS_BEARER_TOKEN>"

  # ==============================================================================================
  # SCRAPE CLICKHOUSE DATABASE METRICS
  # ==============================================================================================
  - job_name: "clickhouse"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["clickhouse:8123"]
        labels:
          cluster: "prod-cluster-01"
          environment: "prod"
    basic_auth:
      username: "admin"
      password: "admin123"

  # ==============================================================================================
  # SCRAPE APACHE NIFI METRICS
  # ==============================================================================================
  - job_name: "nifi"
    metrics_path: "/nifi-api/flow/metrics/prometheus"
    static_configs:
      - targets: ["nifi:8086"]
        labels:
          cluster: "nifi-cluster"
          environment: "prod"
    # basic_auth:
