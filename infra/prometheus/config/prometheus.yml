    #   password: "admin"

  # ==============================================================================================
  # SCRAPE LOKI METRICS
  # ==============================================================================================
  - job_name: "loki"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["loki:3100"]

  # ==============================================================================================
  # SCRAPE PUSHGATEWAY (for Spark batch metrics)
  # ==============================================================================================
  - job_name: 'pushgateway'
    honor_labels: true
    static_configs:
      - targets: ["pushgateway:9091"]
  