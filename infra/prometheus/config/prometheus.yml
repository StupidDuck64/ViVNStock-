global:
  scrape_interval: 15s # Xác định tần suất Prometheus scrape dữ liệu từ các target.
  scrape_timeout: 10s # Thời gian tối đa một request scrape một target.
  evaluation_interval: 1m # Tần suất Prometheus đánh giá các rule và alerting rule.
  rule_query_offset: 10s # Thời gian dùng để đánh giá rule tính từ thời điểm trước đó đến hiện tại

rule_files:
  - alert-rules.yml

alerting:
  alertmanagers:
    - static_configs:
      - targets: ['alertmanager:9093']

# Scrape configurations
scrape_configs:
  # ==============================================================================================
  # SCRAPE DOCKER METRICS
  # ==============================================================================================
  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]

  # ==============================================================================================
  # SCRAPE PROMETHEUS METRICS
  # ==============================================================================================
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # ==============================================================================================
  # SCRAPE TRINO API METRICS
  # ==============================================================================================
  - job_name: "trino"
    metrics_path: /metrics
    static_configs:
      - targets: ["trino:8080"]
    basic_auth:
      username: "fss"
      password: ""

  # ==============================================================================================
  # SCRAPE NODE EXPORTER (Host RAM/CPU/Disk)
  # ==============================================================================================
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]

  # ==============================================================================================
  # SCRAPE KAFKA JMX EXPORTER (Consumer Lag, Broker Metrics)
  # ==============================================================================================
  - job_name: "kafka"
    static_configs:
      - targets: ["kafka:9404"]
    metrics_path: /metrics

  # ==============================================================================================
  # SCRAPE SPARK METRICS (Master + Workers)
  # ==============================================================================================
  - job_name: "spark-master"
    metrics_path: /metrics/prometheus
    static_configs:
      - targets: ["spark-master:8080"]

  - job_name: "spark-worker"
    metrics_path: /metrics/prometheus
    static_configs:
      - targets: ["spark-worker-1:8081", "spark-worker-2:8081"]

  # ==============================================================================================
  # SCRAPE POSTGRES EXPORTER
  # ==============================================================================================
  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]

  # ==============================================================================================
  # SCRAPE VNSTOCK API
  # ==============================================================================================
  - job_name: "vnstock-api"
    metrics_path: /api/health
    scrape_interval: 30s
    static_configs:
      - targets: ["vnstock-api:8000"]

  # ==============================================================================================
  # SCRAPE AIRFLOW HEALTH
  # ==============================================================================================
  - job_name: "airflow"
    metrics_path: /health
    scrape_interval: 30s
    static_configs:
      - targets: ["airflow-apiserver:8080"]

