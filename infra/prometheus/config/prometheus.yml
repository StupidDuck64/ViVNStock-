global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 30s
  external_labels:
    cluster: "vivnstock-prod"
    environment: "production"

rule_files:
  - alert-rules.yml

alerting:
  alertmanagers:
    - static_configs:
      - targets: ['alertmanager:9093']

# ================================================================================================
# SCRAPE CONFIGURATIONS â€” Production Grade
# ================================================================================================
scrape_configs:

  # â”€â”€ Self-monitoring â”€â”€
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # â”€â”€ Infrastructure Metrics â”€â”€
  - job_name: "cadvisor"
    scrape_interval: 30s
    static_configs:
      - targets: ["cadvisor:8080"]
    metric_relabel_configs:
      - source_labels: [name]
        regex: ""
        action: drop

  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]

  # â”€â”€ Message Queue â”€â”€
  - job_name: "kafka"
    scrape_interval: 10s
    static_configs:
      - targets: ["kafka-exporter:9308"]

  # â”€â”€ Compute Engine â”€â”€
  - job_name: "trino"
    metrics_path: /metrics
    static_configs:
      - targets: ["trino:8080"]
    basic_auth:
      username: "fss"
      password: ""

  - job_name: "spark-master"
    metrics_path: /metrics/master/prometheus/
    scrape_interval: 30s
    static_configs:
      - targets: ["spark-master:8080"]

  - job_name: "spark-worker"
    metrics_path: /metrics/prometheus/
    scrape_interval: 30s
    static_configs:
      - targets: ["spark-worker-1:8091", "spark-worker-2:8092"]

  # â”€â”€ Databases â”€â”€
  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: "clickhouse"
    metrics_path: /metrics
    static_configs:
      - targets: ["clickhouse-01:8123"]

  # â”€â”€ Cache â”€â”€
  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]

  # â”€â”€ Object Storage â€” MinIO v2 â”€â”€
  # NOTE: To enable MinIO metrics, generate a Prometheus token:
  #   mc admin prometheus generate <alias> cluster
  # Then replace the bearer_token values below
  # - job_name: "minio_cluster"
  #   metrics_path: /minio/v2/metrics/cluster
  #   scheme: http
  #   static_configs:
  #     - targets: ["minio:9000"]
  #   bearer_token: "YOUR_MINIO_PROMETHEUS_JWT_TOKEN"
  #
  # - job_name: "minio_bucket"
  #   metrics_path: /minio/v2/metrics/bucket
  #   scheme: http
  #   static_configs:
  #     - targets: ["minio:9000"]
  #   bearer_token: "YOUR_MINIO_PROMETHEUS_JWT_TOKEN"
  #
  # - job_name: "minio_node"
  #   metrics_path: /minio/v2/metrics/node
  #   scheme: http
  #   static_configs:
  #     - targets: ["minio:9000"]
  #   bearer_token: "YOUR_MINIO_PROMETHEUS_JWT_TOKEN"
  #
  # - job_name: "minio_resource"
  #   metrics_path: /minio/v2/metrics/resource
  #   scheme: http
  #   static_configs:
  #     - targets: ["minio:9000"]
  #   bearer_token: "YOUR_MINIO_PROMETHEUS_JWT_TOKEN"

  # â”€â”€ Application Metrics â”€â”€
  - job_name: "vnstock-api"
    metrics_path: /api/metrics
    scrape_interval: 10s
    static_configs:
      - targets: ["vnstock-api:8000"]

  - job_name: "airflow"
    metrics_path: /health
    scrape_interval: 30s
    static_configs:
      - targets: ["airflow-apiserver:8080"]

  # â”€â”€ Batch Job Metrics (Spark jobs, backfill push) â”€â”€
  - job_name: "pushgateway"
    honor_labels: true
    static_configs:
      - targets: ["pushgateway:9091"]


