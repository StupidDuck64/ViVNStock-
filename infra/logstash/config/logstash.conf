# ════════════════════════════════════════════════════════════════════════════════
# Logstash Pipeline — Production Configuration
# Input: Filebeat (beats) + Docker container logs (file)
# Filter: FastAPI, Producer, Spark, generic container log parsing
# Output: Elasticsearch with daily index pattern
# ════════════════════════════════════════════════════════════════════════════════

input {
  # ── Filebeat input (primary) ──
  beats {
    port => 5044
  }

  # ── Direct Docker log file input (fallback) ──
  file {
    path => "/var/lib/docker/containers/*/*.log"
    type => "docker"
    codec => json
    sincedb_path => "/usr/share/logstash/data/sincedb_docker"
  }
}

filter {
  # ════════════════════════════════════════
  # DOCKER JSON FORMAT — Common parsing
  # ════════════════════════════════════════
  if [type] == "docker" {
    if [attrs][tag] {
      mutate { add_field => { "container_name" => "%{[attrs][tag]}" } }
    }
    if [log] {
      mutate { rename => { "log" => "message" } }
    }
    date {
      match => ["time", "ISO8601"]
      target => "@timestamp"
    }
    mutate {
      remove_field => ["time", "attrs"]
    }
  }

  # ════════════════════════════════════════
  # FastAPI / VNStock API Log Parsing
  # Pattern: 172.18.0.1 - "GET /api/v1/history?symbol=VNM HTTP/1.1" 200 0.045
  # ════════════════════════════════════════
  if [container_name] =~ /vnstock-api/ or [docker][container][name] =~ /vnstock-api/ or [container][name] =~ /vnstock-api/ {
    mutate { add_field => { "service" => "vnstock-api" } }

    grok {
      match => {
        "message" => [
          "%{IP:client_ip} - \"%{WORD:http_method} %{URIPATH:request_path}(?:%{URIPARAM:request_params})? HTTP/%{NUMBER:http_version}\" %{NUMBER:status_code:integer} %{NUMBER:response_time:float}",
          "%{TIMESTAMP_ISO8601:log_timestamp} - %{LOGLEVEL:log_level} - %{GREEDYDATA:log_message}",
          "%{GREEDYDATA:log_message}"
        ]
      }
      tag_on_failure => ["_fastapi_grok_failure"]
    }

    # Extract query parameters
    if [request_params] {
      kv {
        source => "request_params"
        field_split => "&"
        value_split => "="
        prefix => "param_"
        remove_char_key => "?"
      }
    }

    # Classify HTTP status
    if [status_code] {
      if [status_code] >= 500 {
        mutate { add_field => { "status_class" => "5xx_server_error" } }
      } else if [status_code] >= 400 {
        mutate { add_field => { "status_class" => "4xx_client_error" } }
      } else if [status_code] >= 300 {
        mutate { add_field => { "status_class" => "3xx_redirect" } }
      } else if [status_code] >= 200 {
        mutate { add_field => { "status_class" => "2xx_success" } }
      }
    }
  }

  # ════════════════════════════════════════
  # Producer Log Parsing
  # Pattern: 2025-01-15 10:30:45 INFO [VNM] Produced 500 records to kafka partition 2
  # ════════════════════════════════════════
  else if [container_name] =~ /producer/ or [docker][container][name] =~ /producer/ or [container][name] =~ /producer/ {
    mutate { add_field => { "service" => "producer" } }

    grok {
      match => {
        "message" => [
          "%{TIMESTAMP_ISO8601:log_timestamp} %{LOGLEVEL:log_level} \[%{WORD:symbol}\] %{GREEDYDATA:action}",
          "%{TIMESTAMP_ISO8601:log_timestamp} - %{LOGLEVEL:log_level} - .*symbol[=: ]+%{WORD:symbol}.*batch[_size]*[=: ]+%{NUMBER:batch_size:integer}.*partition[=: ]+%{NUMBER:kafka_partition:integer}",
          "%{TIMESTAMP_ISO8601:log_timestamp} - %{LOGLEVEL:log_level} - %{GREEDYDATA:log_message}",
          "%{GREEDYDATA:log_message}"
        ]
      }
      tag_on_failure => ["_producer_grok_failure"]
    }
  }

  # ════════════════════════════════════════
  # Spark Log Parsing
  # ════════════════════════════════════════
  else if [container_name] =~ /spark/ or [docker][container][name] =~ /spark/ or [container][name] =~ /spark/ {
    mutate { add_field => { "service" => "spark" } }

    grok {
      match => {
        "message" => [
          "%{TIMESTAMP_ISO8601:log_timestamp} %{LOGLEVEL:log_level} %{JAVACLASS:java_class}: %{GREEDYDATA:log_message}",
          "%{GREEDYDATA:log_message}"
        ]
      }
      tag_on_failure => ["_spark_grok_failure"]
    }
  }

  # ════════════════════════════════════════
  # Airflow Log Parsing
  # ════════════════════════════════════════
  else if [container_name] =~ /airflow/ or [docker][container][name] =~ /airflow/ or [container][name] =~ /airflow/ {
    mutate { add_field => { "service" => "airflow" } }

    grok {
      match => {
        "message" => [
          "\[%{TIMESTAMP_ISO8601:log_timestamp}\] \{%{DATA:airflow_module}\} %{LOGLEVEL:log_level} - %{GREEDYDATA:log_message}",
          "%{GREEDYDATA:log_message}"
        ]
      }
      tag_on_failure => ["_airflow_grok_failure"]
    }
  }

  # ════════════════════════════════════════
  # Kafka Log Parsing
  # ════════════════════════════════════════
  else if [container_name] =~ /kafka/ or [docker][container][name] =~ /kafka/ or [container][name] =~ /kafka/ {
    mutate { add_field => { "service" => "kafka" } }
  }

  # ════════════════════════════════════════
  # Trino Log Parsing
  # ════════════════════════════════════════
  else if [container_name] =~ /trino/ or [docker][container][name] =~ /trino/ or [container][name] =~ /trino/ {
    mutate { add_field => { "service" => "trino" } }
  }

  # ════════════════════════════════════════
  # ClickHouse Log Parsing
  # ════════════════════════════════════════
  else if [container_name] =~ /clickhouse/ or [docker][container][name] =~ /clickhouse/ or [container][name] =~ /clickhouse/ {
    mutate { add_field => { "service" => "clickhouse" } }
  }

  # ════════════════════════════════════════
  # Generic container — classify by name
  # ════════════════════════════════════════
  else {
    if [container][name] {
      mutate { add_field => { "service" => "%{[container][name]}" } }
    } else if [docker][container][name] {
      mutate { add_field => { "service" => "%{[docker][container][name]}" } }
    }
  }

  # ════════════════════════════════════════
  # COMMON: Log level classification (fallback)
  # ════════════════════════════════════════
  if ![log_level] {
    if [message] =~ /(?i)\b(ERROR|EXCEPTION|TRACEBACK|FATAL)\b/ {
      mutate { add_field => { "log_level" => "ERROR" } }
    } else if [message] =~ /(?i)\bWARN(ING)?\b/ {
      mutate { add_field => { "log_level" => "WARN" } }
    } else if [message] =~ /(?i)\bDEBUG\b/ {
      mutate { add_field => { "log_level" => "DEBUG" } }
    } else {
      mutate { add_field => { "log_level" => "INFO" } }
    }
  }

  # Normalize log_level to uppercase
  mutate {
    uppercase => ["log_level"]
  }

  # Drop empty messages & healthcheck noise
  if [message] =~ /^\s*$/ {
    drop {}
  }
  if [message] =~ /GET \/health|GET \/api\/health|GET \/api\/metrics|GET \/metrics|GET \/-\/healthy|GET \/ready/ {
    drop {}
  }
}

output {
  # ── Primary: VIVNStock index pattern ──
  if [service] {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "vivnstock-logs-%{+YYYY.MM.dd}"
      ilm_enabled => true
      ilm_rollover_alias => "vivnstock-logs"
      ilm_pattern => "{now/d}-000001"
      ilm_policy => "vivnstock-logs-policy"
    }
  }
  # ── Fallback: Docker logs ──
  else if [type] == "docker" {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "docker-logs-%{+YYYY.MM.dd}"
    }
  }
  # ── Other beats input ──
  else {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "misc-logs-%{+YYYY.MM.dd}"
    }
  }
}