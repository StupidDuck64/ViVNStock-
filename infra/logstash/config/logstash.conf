input {
  beats {
    port => 5044
  }

  file {
    path => "/var/lib/docker/containers/*/*.log"
    type => "docker"
    codec => json
    sincedb_path => "/usr/share/logstash/data/sincedb_docker"
  }
}

filter {
  if [type] == "docker" {
    # Extract container name from attrs
    if [attrs][tag] {
      mutate { add_field => { "container_name" => "%{[attrs][tag]}" } }
    }

    # Parse the log field (Docker JSON log format)
    if [log] {
      mutate { rename => { "log" => "message" } }
    }

    # Parse timestamp from Docker
    date {
      match => ["time", "ISO8601"]
      target => "@timestamp"
    }

    # Remove unnecessary fields
    mutate {
      remove_field => ["time", "attrs"]
    }
  }
}

output {
  if [type] == "docker" {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "docker-logs-%{+YYYY.MM.dd}"
    }
  } else if "filter" in [tags] {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "index-%{+YYYY.MM.dd}"
    }
  }
  # stdout { codec => rubydebug }
}