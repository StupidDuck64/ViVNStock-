# =============================================================================
# Build Stage — Docker image builds using Kaniko
# =============================================================================
# Only builds services whose files have changed.
# Uses the .kaniko-build template from templates.yml.
# =============================================================================

# ── Core Data ────────────────────────────────────────────────────────────────

build:postgres:
  extends: .kaniko-build
  variables:
    DOCKERFILE_PATH: "infra/postgres/Dockerfile"
    BUILD_CONTEXT: "infra/postgres"
    IMAGE_NAME: "postgres"
  rules:
    - if: $CI_COMMIT_BRANCH == "dev" || $CI_COMMIT_BRANCH == "main"
      changes:
        - "infra/postgres/**/*"

build:redis:
  extends: .kaniko-build
  variables:
