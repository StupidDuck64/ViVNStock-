# =============================================================================
# Security Stage — SAST, Secret Detection, Container Scanning
# =============================================================================

# ---------------------------------------------------------------------------
# GitLab SAST (Static Application Security Testing)
# ---------------------------------------------------------------------------
include:
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml

sast:
  stage: security

secret_detection:
  stage: security

# ---------------------------------------------------------------------------
# Container Scanning — scan built images for vulnerabilities
# ---------------------------------------------------------------------------
security:container-scan:
  stage: security
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  variables:
    TRIVY_NO_PROGRESS: "true"
    TRIVY_SEVERITY: "HIGH,CRITICAL"
  script:
    - echo "🔒 Scanning Docker images for vulnerabilities..."
    # Scan key Dockerfiles (no need to build — scan the Dockerfile directly)
    - |
      for service in postgres kafka spark airflow data-generator trino clickhouse; do
        DOCKERFILE="infra/${service}/Dockerfile"
        if [ -f "${DOCKERFILE}" ]; then
          echo "  → Scanning ${DOCKERFILE}"
          trivy config --severity "${TRIVY_SEVERITY}" "${DOCKERFILE}" || true
        fi
      done
    # Scan docker-compose for misconfigurations
    - trivy config --severity "${TRIVY_SEVERITY}" docker-compose.yml || true
    - echo "✅ Security scan complete"
  artifacts:
    when: always
    expire_in: 7 days
  allow_failure: true
  rules:
    - if: $CI_COMMIT_BRANCH == "dev" || $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# ---------------------------------------------------------------------------
# Secrets in .env check — ensure no real secrets committed
# ---------------------------------------------------------------------------
security:env-check:
  stage: security
  image: alpine:3.19
  script:
    - echo "🔒 Checking for committed .env files with secrets..."
    - |
      if [ -f ".env" ]; then
        echo "⚠️  WARNING: .env file is tracked in git!"
        echo "   Make sure it only contains non-sensitive defaults."
        echo "   Real secrets should be in GitLab CI/CD Variables."
      fi
    - echo "✅ Env check complete"
  allow_failure: true
