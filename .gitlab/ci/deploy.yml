# =============================================================================
# Deploy Stage — SSH into VM and run docker-compose
# =============================================================================
# Single VM deployment. Auto-deploy from dev, manual approval from main.
# =============================================================================

# ---------------------------------------------------------------------------
# Deploy from dev branch (automatic)
# ---------------------------------------------------------------------------
deploy:dev:
  extends: .deploy-base
  variables:
    DEPLOY_HOST: "${DEPLOY_HOST}"
  environment:
    name: lakehouse
    url: "http://${DEPLOY_HOST}:8085"
  rules:
    - if: $CI_COMMIT_BRANCH == "dev"

# ---------------------------------------------------------------------------
# Deploy from main branch (manual approval)
# ---------------------------------------------------------------------------
deploy:main:
  extends: .deploy-base
  variables:
    DEPLOY_HOST: "${DEPLOY_HOST}"
  environment:
    name: lakehouse
    url: "http://${DEPLOY_HOST}:8085"
  when: manual
  allow_failure: false
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# ---------------------------------------------------------------------------
# Stop environment (manual)
# ---------------------------------------------------------------------------
stop:lakehouse:
  stage: deploy
  image: alpine:3.19
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$DEPLOY_SSH_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null
  script:
    - |
      ssh "${DEPLOY_USER}@${DEPLOY_HOST}" << 'ENDSSH'
        cd ${DEPLOY_PATH}
        docker compose --profile core --profile airflow down
        echo "🛑 Lakehouse environment stopped"
      ENDSSH
  environment:
    name: lakehouse
    action: stop
  rules:
    - if: $CI_COMMIT_BRANCH == "dev" || $CI_COMMIT_BRANCH == "main"
      when: manual
  allow_failure: true
