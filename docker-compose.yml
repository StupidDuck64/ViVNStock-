      # To test the lineage backend
      # AIRFLOW__LINEAGE__BACKEND: airflow_provider_openmetadata.lineage.backend.OpenMetadataLineageBackend
      # AIRFLOW__LINEAGE__AIRFLOW_SERVICE_NAME: local_airflow
      # AIRFLOW__LINEAGE__OPENMETADATA_API_ENDPOINT: http://openmetadata-server:8585/api
      # AIRFLOW__LINEAGE__JWT_TOKEN: ...
    entrypoint: /bin/bash
    command:
      - "/opt/airflow/ingestion_dependency.sh"
    expose:
      - 8080
    ports:
      - "${AIRFLOW_UI_PORT:-8087}:8080"
    networks:
      - default
    volumes:
      - ingestion-volume-dag-airflow:/opt/airflow/dag_generated_configs
      - ingestion-volume-dags:/opt/airflow/dags
      - ingestion-volume-tmp:/tmp
      - ./infra/openmetadata/ingestion/configs:/app/ingestion/configs:ro
      - ./infra/openmetadata/ingestion/logs:/app/ingestion/logs
      - ./infra/openmetadata/ingestion/ingestion_dependency.sh:/opt/airflow/ingestion_dependency.sh
    env_file:
      - ./infra/openmetadata/ingestion/.env
    profiles: [openmetadata]

  # ── Lakehouse Portal — Centralized Dashboard ──
  lakehouse-portal:
    build:
      context: ./infra/portal
    container_name: lakehouse-portal
    restart: unless-stopped
    ports:
      - "${PORTAL_PORT:-3100}:80"
    depends_on:
      oauth2-proxy:
        condition: service_started
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    profiles: [core, portal]

  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
    container_name: oauth2-proxy
    restart: unless-stopped
    ports:
      - "4180:4180"
    environment:
      OAUTH2_PROXY_PROVIDER: keycloak-oidc
      OAUTH2_PROXY_CLIENT_ID: lakehouse-portal
      OAUTH2_PROXY_CLIENT_SECRET: ${OAUTH2_PROXY_CLIENT_SECRET}
      OAUTH2_PROXY_COOKIE_SECRET: ${OAUTH2_PROXY_COOKIE_SECRET}
      OAUTH2_PROXY_OIDC_ISSUER_URL: http://keycloak:8080/realms/data-platform
      OAUTH2_PROXY_REDIRECT_URL: http://127.0.0.1:3100/oauth2/callback
      OAUTH2_PROXY_EMAIL_DOMAINS: "*"
      OAUTH2_PROXY_COOKIE_DOMAINS: "localhost,127.0.0.1"
      OAUTH2_PROXY_COOKIE_SECURE: "false"
      OAUTH2_PROXY_UPSTREAMS: "file:///dev/null"
      OAUTH2_PROXY_HTTP_ADDRESS: "0.0.0.0:4180"
      OAUTH2_PROXY_PASS_ACCESS_TOKEN: "true"
      OAUTH2_PROXY_PASS_AUTHORIZATION_HEADER: "true"
      OAUTH2_PROXY_SKIP_PROVIDER_BUTTON: "true"
      OAUTH2_PROXY_INSECURE_OIDC_SKIP_ISSUER_VERIFICATION: "true"
      OAUTH2_PROXY_INSECURE_OIDC_ALLOW_UNVERIFIED_EMAIL: "true"
    depends_on:
      keycloak:
        condition: service_healthy
    profiles: [core, portal]

  # ===== PROMTAIL (Log collector → Loki) =====
  promtail:
    image: grafana/promtail:3.3.2
    container_name: promtail
    hostname: promtail
    volumes:
      - ./infra/promtail/config/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command:
      - "--config.file=/etc/promtail/config.yml"
    depends_on:
      - loki
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          cpus: "0.05"
          memory: 64M
    restart: unless-stopped
    profiles: [monitoring]

volumes:
  minio-data:
  pg-data:
  kafka-data:
  trino-data:
  clickhouse-01-data:
  clickhouse-02-data:
  vault-data:
  keycloak-db:
  terraform-plugins:
  nifi-data:
  nifi-conf:
  nifi-logs:
  ranger-data:
  elasticsearch-data:
  hue-data:
  prometheus-data:
  grafana-data:
  loki-data:
  cadvisor-data:
  hadoop_namenode:
  hadoop_datanode0:
  hadoop_datanode1:
  hadoop_datanode2:
  hadoop_historyserver:
  ingestion-volume-dag-airflow:
  ingestion-volume-dags:
  ingestion-volume-tmp:
  flink-data:
