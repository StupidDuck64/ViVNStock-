    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      trino:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 512M
    profiles: [core, ranger, superset]

  superset-worker:
    build:
      context: ./infra/superset
    entrypoint: ["/app/pythonpath/worker-entrypoint.sh"]
    environment:
      - SUPERSET_SECRET_KEY=${SUPERSET_SECRET_KEY:-your_superset_key}   # .env fallback; overridden by Vault
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-admin}   # .env fallback; overridden by Vault
      # Vault — worker-entrypoint.sh overrides secrets above
      # Phase 3: replace VAULT_TOKEN with AppRole secret-id
      - VAULT_ADDR=http://vault:8200
      - VAULT_TOKEN=dev-root-token
    depends_on:
      redis:
        condition: service_healthy
      superset:
        condition: service_started
    deploy:
