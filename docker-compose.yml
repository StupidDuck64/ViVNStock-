      - SUPERSET_ADMIN_USERNAME=${SUPERSET_ADMIN_USERNAME}
      - SUPERSET_ADMIN_PASSWORD=${SUPERSET_ADMIN_PASSWORD:-admin}   # .env fallback; overridden by Vault
      - SUPERSET_ADMIN_FIRSTNAME=${SUPERSET_ADMIN_FIRSTNAME}
      - SUPERSET_ADMIN_LASTNAME=${SUPERSET_ADMIN_LASTNAME}
      - SUPERSET_ADMIN_EMAIL=${SUPERSET_ADMIN_EMAIL}
      - POSTGRES_USER=${POSTGRES_USER:-admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-admin}   # .env fallback; overridden by Vault
      # Vault — create_admin.sh overrides secrets above
      # Phase 3: replace VAULT_TOKEN with AppRole secret-id
      - VAULT_ADDR=http://vault:8200
      - VAULT_TOKEN=dev-root-token
    ports:
      - "8089:8088"
    volumes:
      - ./infra/superset/superset_config_keycloak.py:/app/pythonpath/superset_config_keycloak.py
      - ./infra/superset/provisioning:/app/provisioning
    extra_hosts:
