  spark-thriftserver:
    build:
      context: ./infra/spark
      dockerfile: Dockerfile.thriftserver
    environment:
      - SPARK_MASTER_URL=spark://spark-master:7077 # Connect to spark-master service
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
      - SPARK_HADOOOP_FS_S3A_ACCESS_KEY=${MINIO_ROOT_USER}
      - SPARK_HADOOOP_FS_S3A_SECRET_KEY=${MINIO_ROOT_PASSWORD}
      - HOME=/opt/bitnami/spark
      - SPARK_SUBMIT_OPTS=-Divy.home=/opt/bitnami/spark/.ivy2 -Divy.cache.dir=/opt/bitnami/spark/.ivy2/cache
    ports:
      - "10000:10000"
      - "10001:10001"
    depends_on:
      minio:
        condition: service_healthy
      hive-metastore:
        condition: service_healthy
      spark-master:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 512M
    profiles: [core, ranger, tuan]
  # Security - HashiCorp Vault

  vault:
    image: hashicorp/vault:1.15
    container_name: vault
    restart: unless-stopped
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: "dev-root-token"
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
      # VAULT_ADDR is the client-side address — must be reachable, not the bind address
      VAULT_ADDR: "http://127.0.0.1:8200"
    cap_add:
      - IPC_LOCK
    volumes:
      - vault-data:/vault/data
    command: server -dev

    healthcheck:
      # Use the vault binary (always present in the image) so we avoid
      # busybox-wget flag incompatibilities. `vault status` exits 0 only
      # when the server is reachable, initialised, and unsealed — i.e. ready.
      # Dev mode satisfies all three conditions automatically.
      test: ["CMD-SHELL", "vault status 2>&1 | grep -q 'Initialized.*true'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - default
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
        reservations:
          cpus: "0.10"
          memory: 128M
    profiles: [core, vault-setup, portal]

  # Seed all platform secrets into Vault KV v2 (runs once at startup)
  vault-init:
    image: hashicorp/vault:1.15
    container_name: vault-init
    environment:
      VAULT_ADDR: "http://vault:8200"
      VAULT_TOKEN: "dev-root-token"
    env_file:
      - .env
    volumes:
      - ./infra/vault/init-secrets.sh:/init-secrets.sh:ro
    entrypoint: ["/bin/sh", "/init-secrets.sh"]
    depends_on:
      vault:
        condition: service_healthy
    restart: "no"
    networks:
      - default
    profiles: [core, portal]

  # Create AppRole auth + per-service policies (run manually when needed)
  # Usage: docker compose --profile vault-setup run --rm vault-setup
  vault-setup:
    image: hashicorp/vault:1.15
    container_name: vault-setup
    environment:
      VAULT_ADDR: "http://vault:8200"
      VAULT_TOKEN: "dev-root-token"
      POLICIES_DIR: "/vault/policies"
    volumes:
      - ./infra/vault/setup-approles.sh:/setup-approles.sh:ro
      - ./infra/vault/policies:/vault/policies:ro
    entrypoint: ["/bin/sh", "/setup-approles.sh"]
    depends_on:
      vault:
        condition: service_healthy
    restart: "no"
    networks:
      - default
    profiles: [vault-setup]

  # IAM - Keycloak + PostgreSQL

  keycloak-db:
    build:
      context: ./infra/keycloak
      dockerfile: Dockerfile.keycloak-db

    container_name: keycloak-db

    restart: unless-stopped

    environment:
      POSTGRES_DB: keycloak

      POSTGRES_USER: keycloak

      POSTGRES_PASSWORD: ${KC_DB_PASSWORD:-keycloak_pass}   # .env fallback; overridden by Vault

      # Vault — vault-entrypoint-db.sh overrides POSTGRES_PASSWORD above
      # Phase 3: replace VAULT_TOKEN with AppRole secret-id
      VAULT_ADDR: "http://vault:8200"

      VAULT_TOKEN: "dev-root-token"

    volumes:
      - keycloak-db:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]

      interval: 10s

      timeout: 5s

      retries: 5

    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 384M
        reservations:
          cpus: "0.10"
          memory: 192M
    profiles: [core, keycloak, ranger, hihi, flink, trino, datahub, portal]

  keycloak:
    build:
      context: ./infra/keycloak

    container_name: keycloak

    restart: unless-stopped

    ports:
      - "18084:8080"

    environment:
      KEYCLOAK_ADMIN: admin

      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin123}   # .env fallback; overridden by Vault
      
      KC_DB: postgres

      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak

      KC_DB_USERNAME: keycloak

      KC_DB_PASSWORD: ${KC_DB_PASSWORD:-keycloak_pass}   # .env fallback; overridden by Vault

      KC_HOSTNAME: ${KEYCLOAK_HOST:-localhost}

      KC_HOSTNAME_ADMIN_URL: http://${KEYCLOAK_HOST:-localhost}:${KEYCLOAK_PORT:-18084}

      KC_HOSTNAME_PORT: ${KEYCLOAK_PORT:-18084}

      KC_HOSTNAME_STRICT: "false"

      KC_HOSTNAME_STRICT_HTTPS: "false"

      KC_HTTP_ENABLED: "true"

      KC_HEALTH_ENABLED: "true"

      # Vault — vault-entrypoint.sh overrides credentials above
      # Phase 3: replace VAULT_TOKEN with AppRole secret-id
      VAULT_ADDR: "http://vault:8200"

      VAULT_TOKEN: "dev-root-token"
    depends_on:
      keycloak-db:
        condition: service_healthy
    # --import-realm: scan /data/import/*.xml, import if realm does not already exist
    command: start-dev --import-realm --spi-import-export-strategy=OVERWRITE_EXISTING

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.1\\r\\nhost: localhost\\r\\n\\r\\n' >&3 && timeout 1 cat <&3 | grep -q HTTP || exit 1",
        ]

      interval: 30s

      timeout: 10s

      retries: 5

      start_period: 60s

    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 768M
        reservations:
          cpus: "0.25"
          memory: 384M
    profiles: [core, keycloak, ranger, hihi, flink, trino, datahub, portal]

  keycloak-init:
    image: quay.io/keycloak/keycloak:23.0.7
    container_name: keycloak-init
    depends_on:
      keycloak:
        condition: service_started
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin123}   # .env fallback; overridden by init.sh vault fetch
      # Vault — init.sh vault_fetch() overrides KEYCLOAK_ADMIN_PASSWORD above
      # Phase 3: replace VAULT_TOKEN with AppRole secret-id
      VAULT_ADDR: "http://vault:8200"
      VAULT_TOKEN: "dev-root-token"
    volumes:
      - ./infra/keycloak/init.sh:/init.sh
    entrypoint: ["/bin/bash", "/init.sh"]
    restart: "no"
    networks:
      - default
    profiles: [core, keycloak, ranger, hihi, flink, trino, datahub]

  # Unstructured Data - Apache NiFi

  nifi:
    image: apache/nifi:1.25.0

    container_name: nifi

    restart: unless-stopped

    # vault-entrypoint.sh fetches SINGLE_USER_CREDENTIALS_PASSWORD then execs the real NiFi start script
    entrypoint: ["/bin/bash", "/vault-entrypoint.sh"]

    ports:
      - "8443:8443"

      - "8086:8086" # remapped to avoid conflict with kafka-ui
      - "8086:8086" # remapped to avoid conflict with kafka-ui

    environment:
      NIFI_WEB_HTTPS_PORT: 8443

      NIFI_WEB_HTTP_PORT: 8086

      NIFI_WEB_HTTPS_HOST: nifi

      SINGLE_USER_CREDENTIALS_USERNAME: admin

      SINGLE_USER_CREDENTIALS_PASSWORD: ${NIFI_ADMIN_PASSWORD:-adminadminadmin}   # .env fallback; overridden by Vault

      NIFI_JVM_HEAP_INIT: 2g

      NIFI_JVM_HEAP_MAX: 4g

      NIFI_CLUSTER_IS_NODE: "false"

      # Vault — vault-entrypoint.sh overrides SINGLE_USER_CREDENTIALS_PASSWORD above
      # Phase 3: replace VAULT_TOKEN with AppRole secret-id
      VAULT_ADDR: "http://vault:8200"

      VAULT_TOKEN: "dev-root-token"

    volumes:
      - nifi-data:/opt/nifi/nifi-current/flowfile_repository
      - nifi-conf:/opt/nifi/nifi-current/conf
      - nifi-logs:/opt/nifi/nifi-current/logs
      - ./dataplatform-extensions/data/nifi:/opt/nifi/nifi-current/data
      - ./infra/nifi/vault-entrypoint.sh:/vault-entrypoint.sh:ro
    healthcheck:
      test: ["CMD", "curl", "-k", "-f", "https://localhost:8443/nifi/"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 512M
    profiles: [core]

  # Streaming - Apache Flink (optional)
  flink-jobmanager:
    build:
      context: ./infra/flink
    container_name: flink-jobmanager
    restart: unless-stopped
    ports:
      - "8095:8081" # remapped to avoid conflict with debezium
    # vault-entrypoint.sh patches FLINK_PROPERTIES (oauth2 secret) then hands off to flink entrypoint
    entrypoint: ["/bin/bash", "/vault-entrypoint.sh"]
    command: ["/docker-entrypoint.sh", "jobmanager"]
    volumes:
      - ./infra/flink/vault-entrypoint.sh:/vault-entrypoint.sh:ro
      - flink-data:/tmp/flink-checkpoints
      - flink-savepoints:/tmp/flink-savepoints
    environment:
      # OAuth2/OIDC Configuration
      OAUTH2_CLIENT_ID: flink
      OAUTH2_CLIENT_SECRET: ${FLINK_OAUTH2_CLIENT_SECRET:-CHANGE_ME_FLINK_SECRET}   # .env fallback; overridden by Vault
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: data-platform
      # Vault — vault-entrypoint.sh patches the secret inside FLINK_PROPERTIES
      # Phase 3: replace VAULT_TOKEN with AppRole secret-id
      VAULT_ADDR: "http://vault:8200"
      VAULT_TOKEN: "dev-root-token"
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        jobmanager.memory.process.size: 2048m
        taskmanager.numberOfTaskSlots: 4
        parallelism.default: 2
        rest.authentication.enabled: true
        security.oauth2.enabled: true
        security.oauth2.client.id: flink
        security.oauth2.client.secret: CHANGE_ME_FLINK_SECRET
        security.oauth2.authorization.endpoint: http://localhost:8084/realms/data-platform/protocol/openid-connect/auth
        security.oauth2.token.endpoint: http://keycloak:8080/realms/data-platform/protocol/openid-connect/token
        security.oauth2.userinfo.endpoint: http://keycloak:8080/realms/data-platform/protocol/openid-connect/userinfo
        security.oauth2.jwks.endpoint: http://keycloak:8080/realms/data-platform/protocol/openid-connect/certs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 512M
    profiles: [core, tuan]
  flink-taskmanager:
    build:
      context: ./infra/flink
    container_name: flink-taskmanager
    restart: unless-stopped
    depends_on:
      flink-jobmanager:
        condition: service_healthy
    # vault-entrypoint.sh patches FLINK_PROPERTIES (MinIO s3a keys) then hands off
    entrypoint: ["/bin/bash", "/vault-entrypoint.sh"]
    command:
      - bash
      - -c
      - >
        mkdir -p /opt/flink/plugins/s3 &&
        cp /opt/flink/opt/flink-s3-fs-hadoop-*.jar /opt/flink/plugins/s3/ &&
        /docker-entrypoint.sh taskmanager
    volumes:
      - ./flink-rocksdb:/flink-rocksdb
      - flink-data:/tmp/flink-checkpoints
      - flink-savepoints:/tmp/flink-savepoints
      - ./infra/flink/vault-entrypoint.sh:/vault-entrypoint.sh:ro
    environment:
      # Vault — vault-entrypoint.sh patches fs.s3a.access.key and fs.s3a.secret.key in FLINK_PROPERTIES
      # Phase 3: replace VAULT_TOKEN with AppRole secret-id
      VAULT_ADDR: "http://vault:8200"
      VAULT_TOKEN: "dev-root-token"
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.memory.process.size: 6g
        taskmanager.numberOfTaskSlots: 4

        # ===== RocksDB State Backend =====
        state.backend: rocksdb
        state.backend.incremental: true
        state.backend.rocksdb.localdir: /flink-rocksdb

        # ===== Checkpoint =====
        state.checkpoints.dir: s3a://flink-checkpoints/checkpoints
        state.savepoints.dir: s3a://flink-checkpoints/savepoints

        # ===== S3 / MinIO =====
        fs.s3a.endpoint: http://minio:9000
        fs.s3a.access.key: minio
        fs.s3a.secret.key: minio123
        fs.s3a.path.style.access: true
        fs.s3a.connection.ssl.enabled: false
        fs.s3a.impl: org.apache.hadoop.fs.s3a.S3AFileSystem
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 2G
        reservations:
          cpus: "0.50"
          memory: 1G
    profiles: [core, tuan]

  flink-nginx-proxy:
    image: openresty/openresty:alpine-fat
    container_name: flink-nginx-proxy
    restart: unless-stopped
    ports:
      - "8096:8443"
    # vault-entrypoint-nginx.sh fetches OIDC_CLIENT_SECRET then execs the original command
    entrypoint: ["/bin/sh", "/vault-entrypoint-nginx.sh"]
    environment:
      FLINK_JOBMANAGER_URL: "http://flink-jobmanager:8081"
      OIDC_DISCOVERY: "http://keycloak:8080/realms/data-platform/.well-known/openid-configuration"
      OIDC_CLIENT_ID: "flink-client"
      OIDC_CLIENT_SECRET: ${FLINK_NGINX_OIDC_CLIENT_SECRET:-CHANGE_ME_FLINK_CLIENT_SECRET}   # .env fallback; overridden by Vault
      OIDC_REDIRECT_URI: "http://localhost:8096/redirect_uri"
      # Vault — vault-entrypoint-nginx.sh overrides OIDC_CLIENT_SECRET above
      # Phase 3: replace VAULT_TOKEN with AppRole secret-id
      VAULT_ADDR: "http://vault:8200"
      VAULT_TOKEN: "dev-root-token"
    volumes:
      - ./infra/flink/nginx-config:/etc/nginx/conf.d:ro
      - ./infra/flink/nginx.conf:/usr/local/openresty/nginx/conf/nginx.conf:ro
      - ./infra/flink/ssl:/etc/nginx/ssl:ro
      - flink-nginx-cache:/.luarocks
      - flink-nginx-cache:/.cache
      - flink-nginx-cache:/usr/local/openresty/nginx/logs
      - flink-nginx-cache:/var/run/openresty
      - ./infra/flink/vault-entrypoint-nginx.sh:/vault-entrypoint-nginx.sh:ro
    command:
      - /bin/sh
      - -c
      - >-
        echo 'Installing lua-resty-openidc...' &&
        luarocks config local_by_default true &&
        luarocks install lua-resty-openidc &&
        echo 'Starting Nginx...' &&
        /usr/local/openresty/nginx/sbin/nginx -g 'daemon off;'
    depends_on:
      keycloak:
        condition: service_healthy
      flink-jobmanager:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--spider",
          "--quiet",
          "--no-check-certificate",
          "https://localhost:8443/health",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - default
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
        reservations:
          cpus: "0.10"
          memory: 128M
    profiles: [flink]

  ranger-admin:
    build:
      context: ./infra/ranger-admin
    container_name: ranger-admin
    hostname: ranger-admin
    environment:
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: data-platform
      KEYCLOAK_CLIENT_ID: ranger-admin-api
      KEYCLOAK_ADMIN_API_SECRET: ${KEYCLOAK_ADMIN_API_SECRET:-ranger-admin-api-secret-local}   # .env fallback; overridden by Vault
      RANGER_URL: http://localhost:6080
      RANGER_ADMIN_USER: admin
      RANGER_ADMIN_PASS: ${RANGER_ADMIN_PASS:-Rangeradmin1}   # .env fallback; overridden by Vault
      RANGER_OAUTH2_SECRET: ${RANGER_OAUTH2_SECRET:-CHANGE_ME_RANGER_SECRET}   # .env fallback; overridden by Vault
      SYNC_INTERVAL_SECONDS: 300
      # Vault — docker-entrypoint.sh vault_fetch overrides credentials above
      # Phase 3: replace VAULT_TOKEN with AppRole secret-id
      VAULT_ADDR: "http://vault:8200"
      VAULT_TOKEN: "dev-root-token"
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 2G
        reservations:
          cpus: "0.50"
          memory: 1G
    ports:
      - 6080:6080
    depends_on:
      postgres:
        condition: service_healthy
      hive-metastore:
        condition: service_healthy
    profiles: [ranger]

  ranger-usersync:
    build:
      context: ./infra/ranger-admin/ranger-usersync
    container_name: ranger-usersync
    restart: "no"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin123}   # .env fallback; overridden by Vault
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: data-platform
      KEYCLOAK_ADMIN_API_SECRET: ${KEYCLOAK_ADMIN_API_SECRET:-ranger-admin-api-secret-local}   # .env fallback; overridden by Vault
      RANGER_URL: http://ranger-admin:6080
      RANGER_ADMIN_USER: admin
      RANGER_ADMIN_PASS: ${RANGER_ADMIN_PASS:-Rangeradmin1}   # .env fallback; overridden by Vault
      # Vault — vault-entrypoint.sh overrides credentials above
      # Phase 3: replace VAULT_TOKEN with AppRole secret-id
      VAULT_ADDR: "http://vault:8200"
      VAULT_TOKEN: "dev-root-token"
    depends_on:
      keycloak:
        condition: service_healthy
      ranger-admin:
        condition: service_healthy
    networks:
      - default
    profiles: [core, ranger]

  elasticsearch:
    build:
      context: ./infra/elasticsearch
    container_name: es01
    hostname: es01
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=${XPACK_SECURITY_ENABLED:-false}
      - DISABLE_SECURITY_PLUGIN=true
      - ES_JAVA_OPTS=${ES_JAVA_OPTS:--Xms500m -Xmx1024m -Dlog4j2.formatMsgNoLookups=true}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sS --fail http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=0s || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    ports:
      - ${ELASTICSEARCH_HTTP_PORT:-9200}:9200
      - ${ELASTICSEARCH_TRANSPORT_PORT:-9300}:9300
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 512M
    networks:
      - default
    profiles: [core, datahub, openmetadata]

  elasticsearch-setup:
    depends_on:
      elasticsearch:
        condition: service_healthy
    hostname: elasticsearch-setup
    build:
      context: ./infra/datahub/elasticsearch-setup
    environment:
      - ELASTICSEARCH_HOST=es01
      - ELASTICSEARCH_PORT=9200
      - ELASTICSEARCH_PROTOCOL=http
      - ELASTICSEARCH_USE_SSL=${ELASTICSEARCH_USE_SSL:-false}
      - USE_AWS_ELASTICSEARCH=${USE_AWS_ELASTICSEARCH:-false}
    labels:
      datahub_setup_job: true
    networks:
      - default
    profiles: [datahub]

  # DataHub Actions - Event processing
  datahub-actions:
    build:
      context: ./infra/datahub/datahub-actions
    hostname: actions
    depends_on:
      datahub-gms:
        condition: service_healthy
    environment:
      # DataHub GMS connection
      - DATAHUB_GMS_HOST=datahub-gms
      - DATAHUB_GMS_PORT=8080
      - DATAHUB_GMS_PROTOCOL=http
      - DATAHUB_SYSTEM_CLIENT_ID=__datahub_system
      - DATAHUB_SYSTEM_CLIENT_SECRET=JohnSnowKnowsNothing
      # Kafka connection
      - KAFKA_BOOTSTRAP_SERVER=kafka:29092
      - KAFKA_PROPERTIES_SECURITY_PROTOCOL=PLAINTEXT
      # Schema Registry connection
      - SCHEMA_REGISTRY_URL=http://schema-registry:8081
      # Topics
      - METADATA_AUDIT_EVENT_NAME=MetadataAuditEvent_v4
      - METADATA_CHANGE_LOG_VERSIONED_TOPIC_NAME=MetadataChangeLog_Versioned_v1
      # Memory optimization
      - JAVA_OPTS=-Xms256m -Xmx768m -XX:+UseG1GC
      # Optional configurations
      - ACTIONS_CONFIG=${ACTIONS_CONFIG:-}
      - ACTIONS_EXTRA_PACKAGES=${ACTIONS_EXTRA_PACKAGES:-}
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 768M
        reservations:
          cpus: "0.25"
          memory: 384M
    networks:
      - default
    profiles: [datahub]

  # DataHub Frontend React - UI
  datahub-frontend-react:
    build:
      context: ./infra/datahub/datahub-frontend-react
    hostname: datahub-frontend-react
    depends_on:
      datahub-gms:
        condition: service_healthy
    environment:
      # DataHub GMS connection
      - DATAHUB_GMS_HOST=datahub-gms
      - DATAHUB_GMS_PORT=8080
      - DATAHUB_SECRET=YouKnowNothing
      - DATAHUB_PLAY_MEM_BUFFER_SIZE=10MB
      # Kafka connection (đã merge)
      - KAFKA_BOOTSTRAP_SERVER=kafka:29092
      - DATAHUB_TRACKING_TOPIC=DataHubUsageEvent_v1
      # Elasticsearch connection (đã merge)
      - ELASTIC_CLIENT_HOST=es01
      - ELASTIC_CLIENT_PORT=9200
      # Keycloak OIDC Authentication
      - AUTH_OIDC_ENABLED=${AUTH_OIDC_ENABLED:-true}
      - AUTH_OIDC_CLIENT_ID=${AUTH_OIDC_CLIENT_ID:-datahub}
      - AUTH_OIDC_CLIENT_SECRET=${AUTH_OIDC_CLIENT_SECRET:-CHANGE_ME_DATAHUB_SECRET}
      - AUTH_OIDC_DISCOVERY_URI=${AUTH_OIDC_DISCOVERY_URI:-http://keycloak:8080/realms/data-platform/.well-known/openid-configuration}
      - AUTH_OIDC_BASE_URL=${AUTH_OIDC_BASE_URL:-http://localhost:9004}
      - AUTH_OIDC_USER_NAME_CLAIM=${AUTH_OIDC_USER_NAME_CLAIM:-preferred_username}
      - AUTH_OIDC_USER_NAME_CLAIM_REGEX=${AUTH_OIDC_USER_NAME_CLAIM_REGEX:-.*}
      - AUTH_OIDC_SCOPE=${AUTH_OIDC_SCOPE:-openid profile email}
      - AUTH_OIDC_CLIENT_AUTHENTICATION_METHOD=${AUTH_OIDC_CLIENT_AUTHENTICATION_METHOD:-client_secret_post}
      - AUTH_OIDC_JIT_PROVISIONING_ENABLED=${AUTH_OIDC_JIT_PROVISIONING_ENABLED:-true}
      - AUTH_OIDC_PRE_PROVISIONING_REQUIRED=${AUTH_OIDC_PRE_PROVISIONING_REQUIRED:-false}
      - AUTH_OIDC_EXTRACT_GROUPS_ENABLED=${AUTH_OIDC_EXTRACT_GROUPS_ENABLED:-true}
      - AUTH_OIDC_GROUPS_CLAIM=${AUTH_OIDC_GROUPS_CLAIM:-datahub-groups}
      - AUTH_OIDC_RESPONSE_TYPE=${AUTH_OIDC_RESPONSE_TYPE:-code}
      - AUTH_OIDC_RESPONSE_MODE=${AUTH_OIDC_RESPONSE_MODE:-query}
      - AUTH_OIDC_USE_NONCE=${AUTH_OIDC_USE_NONCE:-true}
      - AUTH_OIDC_READ_TIMEOUT=${AUTH_OIDC_READ_TIMEOUT:-5000}
      - AUTH_OIDC_EXTRACT_JWT_ACCESS_TOKEN_CLAIMS=${AUTH_OIDC_EXTRACT_JWT_ACCESS_TOKEN_CLAIMS:-true}
      - AUTH_OIDC_PREFERRED_JWS_ALGORITHM=${AUTH_OIDC_PREFERRED_JWS_ALGORITHM:-RS256}
      # Java opts
      - JAVA_OPTS=-Xms512m -Xmx512m -Dhttp.port=9002 -Dconfig.file=datahub-frontend/conf/application.conf -Djava.security.auth.login.config=datahub-frontend/conf/jaas.conf -Dlogback.configurationFile=datahub-frontend/conf/logback.xml -Dlogback.debug=false -Dpidfile.path=/dev/null
    ports:
      - ${DATAHUB_MAPPED_FRONTEND_PORT:-9004}:9002
    volumes:
      - ${HOME}/.datahub/plugins:/etc/datahub/plugins
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 768M
        reservations:
          cpus: "0.25"
          memory: 384M
    networks:
      - default
    profiles: [datahub]
  # DataHub GMS - Generalized Metadata Service
  datahub-gms:
    build:
      context: ./infra/datahub/datahub-gms
    hostname: datahub-gms
    depends_on:
      datahub-upgrade:
        condition: service_completed_successfully
    environment:
      # Server settings
      - DATAHUB_SERVER_TYPE=${DATAHUB_SERVER_TYPE:-quickstart}
      - DATAHUB_TELEMETRY_ENABLED=${DATAHUB_TELEMETRY_ENABLED:-true}
      - DATAHUB_UPGRADE_HISTORY_KAFKA_CONSUMER_GROUP_ID=generic-duhe-consumer-job-client-gms
      - AWS_REGION= ap-southeast-1
      - AWS_DEFAULT_REGION=ap-southeast-1
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
      # PostgreSQL connection (thay vì MySQL)
      - EBEAN_DATASOURCE_DRIVER=org.postgresql.Driver
      - EBEAN_DATASOURCE_HOST=postgres:5432
      - EBEAN_DATASOURCE_USERNAME=${POSTGRES_USER}
      - EBEAN_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
      - EBEAN_DATASOURCE_URL=jdbc:postgresql://postgres:5432/${DATAHUB_DB_NAME:-datahub}?sslmode=disable
      # Elasticsearch connection (đã merge)
      - ELASTICSEARCH_HOST=es01
      - ELASTICSEARCH_PORT=9200
      - ELASTICSEARCH_INDEX_BUILDER_MAPPINGS_REINDEX=true
      - ELASTICSEARCH_INDEX_BUILDER_SETTINGS_REINDEX=true
      - ELASTICSEARCH_LIMIT_RESULTS_STRICT=true
      # Kafka connection (đã merge)
      - KAFKA_BOOTSTRAP_SERVER=kafka:29092
      - KAFKA_SCHEMAREGISTRY_URL=http://schema-registry:8081
      - KAFKA_CONSUMER_STOP_ON_DESERIALIZATION_ERROR=${KAFKA_CONSUMER_STOP_ON_DESERIALIZATION_ERROR:-true}
      # Feature flags
      - MAE_CONSUMER_ENABLED=true
      - MCE_CONSUMER_ENABLED=true
      - PE_CONSUMER_ENABLED=true
      - UI_INGESTION_ENABLED=true
      - METADATA_SERVICE_AUTH_ENABLED=${METADATA_SERVICE_AUTH_ENABLED:-false}
      - ENTITY_SERVICE_ENABLE_RETENTION=true
      - THEME_V2_DEFAULT=true
      # Graph service
      - GRAPH_SERVICE_IMPL=${GRAPH_SERVICE_IMPL:-elasticsearch}
      - GRAPH_SERVICE_DIFF_MODE_ENABLED=true
      # Other settings
      - ENTITY_REGISTRY_CONFIG_PATH=/datahub/datahub-gms/resources/entity-registry.yml
      - ES_BULK_REFRESH_POLICY=WAIT_UNTIL
      # Reduce JVM heap to avoid OOM on low-memory hosts. Increase if your machine has >4GB free for Docker.
      - JAVA_OPTS=-Xms512m -Xmx768m
    ports:
      - ${DATAHUB_MAPPED_GMS_PORT:-8097}:8080
    volumes:
      - ${HOME}/.datahub/plugins:/etc/datahub/plugins
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sS", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 90s
    networks:
      - default
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 1536M
        reservations:
          cpus: "0.50"
          memory: 768M
    profiles: [datahub]
  # DataHub Upgrade - Setup job
  datahub-upgrade:
    build:
      context: ./infra/datahub/datahub-upgrade
    hostname: datahub-upgrade
    command:
      - -u
      - SystemUpdate
    depends_on:
      elasticsearch-setup:
        condition: service_completed_successfully
      kafka-setup:
        condition: service_completed_successfully
      postgres-setup:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    environment:
      # DataHub GMS connection
      - DATAHUB_GMS_HOST=datahub-gms
      - DATAHUB_GMS_PORT=8080
      - AWS_REGION= ap-southeast-1
      - AWS_DEFAULT_REGION=ap-southeast-1
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
      # PostgreSQL connection (thay vì MySQL)
      - EBEAN_DATASOURCE_DRIVER=org.postgresql.Driver
      - EBEAN_DATASOURCE_HOST=postgres:5432
      - EBEAN_DATASOURCE_USERNAME=${POSTGRES_USER}
      - EBEAN_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
      - EBEAN_DATASOURCE_URL=jdbc:postgresql://postgres:5432/${DATAHUB_DB_NAME:-datahub}?sslmode=disable
      # Elasticsearch connection (đã merge)
      - ELASTICSEARCH_HOST=es01
      - ELASTICSEARCH_PORT=9200
      - ELASTICSEARCH_BUILD_INDICES_CLONE_INDICES=false
      - ELASTICSEARCH_INDEX_BUILDER_MAPPINGS_REINDEX=true
      - ELASTICSEARCH_INDEX_BUILDER_SETTINGS_REINDEX=true
      # Kafka connection (đã merge)
      - KAFKA_BOOTSTRAP_SERVER=kafka:29092
      - KAFKA_SCHEMAREGISTRY_URL=http://schema-registry:8081
      # Other settings
      - ENTITY_REGISTRY_CONFIG_PATH=/datahub/datahub-gms/resources/entity-registry.yml
      - GRAPH_SERVICE_IMPL=${GRAPH_SERVICE_IMPL:-elasticsearch}
      - BACKFILL_BROWSE_PATHS_V2=true
      - REPROCESS_DEFAULT_BROWSE_PATHS_V2=false
    labels:
      datahub_setup_job: true
    networks:
      - default
    profiles: [datahub]
