x-airflow-common: &airflow-common
  build:
    context: ./infra/airflow
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: ${AIRFLOW_EXECUTOR}
    AIRFLOW__CORE__AUTH_MANAGER: ${AIRFLOW_AUTH_MANAGER}
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW_DATABASE_SQL_ALCHEMY_CONN}   # .env fallback
    AIRFLOW__CELERY__RESULT_BACKEND: ${AIRFLOW_CELERY_RESULT_BACKEND}           # .env fallback
    AIRFLOW__CELERY__BROKER_URL: ${AIRFLOW_CELERY_BROKER_URL}
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}                            # .env fallback
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: ${AIRFLOW_DAGS_ARE_PAUSED_AT_CREATION}
    AIRFLOW__CORE__LOAD_EXAMPLES: ${AIRFLOW_LOAD_EXAMPLES}
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: ${AIRFLOW_EXECUTION_API_SERVER_URL}
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: ${AIRFLOW_SCHEDULER_ENABLE_HEALTH_CHECK}
    AIRFLOW__API_AUTH__JWT_SECRET_KEY: ${AIRFLOW__API_AUTH__JWT_SECRET_KEY}     # .env fallback
    AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW__API_AUTH__JWT_SECRET_KEY}         # .env fallback
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_API_SECRET_KEY}                   # .env fallback
    AIRFLOW__WEBSERVER__BASE_URL: ${AIRFLOW__WEBSERVER__BASE_URL}
    AIRFLOW_CONFIG: "/opt/airflow/config/airflow.cfg"
    MINIO_ROOT_USER: ${MINIO_ROOT_USER}       # .env fallback; overridden by Vault
    MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD} # .env fallback; overridden by Vault
    S3_ACCESS_KEY: ${MINIO_ROOT_USER}         # .env fallback; overridden by Vault
    S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}     # .env fallback; overridden by Vault
    S3_ENDPOINT: ${S3_ENDPOINT:-minio:9000}
    SPARK_HOME: /opt/spark
    SPARK_JARS_DIR: /opt/spark/jars
    AWS_JAVA_V1_DISABLE_DEPRECATION_ANNOUNCEMENT: "true"
    # Vault — vault-entrypoint.sh reads these and overrides all secret vars above
    # Phase 3: replace VAULT_TOKEN with AppRole secret-id
    VAULT_ADDR: "http://vault:8200"
    VAULT_TOKEN: "dev-root-token"
  # vault-entrypoint.sh fetches secrets then exec's the real Airflow process
  entrypoint: ["bash", "/vault-entrypoint.sh", "/usr/bin/dumb-init", "--", "/entrypoint"]
  volumes:
    - ./infra/airflow/dags:/opt/airflow/dags
    - ./infra/airflow/logs:/opt/airflow/logs
    - ./infra/airflow/plugins:/opt/airflow/plugins
    - ./infra/airflow/config:/opt/airflow/config
    - ./infra/airflow/config/webserver_config.py:/opt/airflow/webserver_config.py
    - ./infra/airflow/config:/opt/airflow/config
    - ./infra/airflow/config/webserver_config.py:/opt/airflow/webserver_config.py
    - ./infra/airflow/processing/spark/jobs:/opt/spark/jobs
    - ./infra/airflow/vault-entrypoint.sh:/vault-entrypoint.sh:ro
    - .:/workspace:cached
  user: "${AIRFLOW_UID}:0"
  depends_on:
    redis:
      condition: service_started
    postgres:
      condition: service_started
services:

  # ╔══════════════════════════════════════════════════════════════════╗
  # ║  VVS (Vietnam Vantage Securities) — Primary Services           ║
  # ║  Profile: vnstock | Ports: 3080 (Frontend), 8060 (API)        ║
  # ╚══════════════════════════════════════════════════════════════════╝

  # ===== VVS MARKET DATA PRODUCER (Hybrid: WS Speed Layer + REST Batch Layer) =====
  vnstock-producer:
    build:
      context: ./infra/vnstock
    # Hybrid producer: WS for real-time ticks + REST for finalized candles → Iceberg
    command: ["python", "-u", "producer.py"]
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC: vnstock.ohlc.realtime
      # Combined fallback (used only if per-board vars are empty)
      SYMBOLS: ${VNSTOCK_SYMBOLS:-VCB,HPG,FPT,VIC,VHM,TCB,MBB,ACB,SSI,VND,GAS,VNM,MSN,MWG,PLX,BID,CTG,STB}
      # Per-board symbol lists (for secdef/quote board-specific subscriptions)
      VNSTOCK_SYMBOLS_HOSE: ${VNSTOCK_SYMBOLS_HOSE:-}
      VNSTOCK_SYMBOLS_HNX: ${VNSTOCK_SYMBOLS_HNX:-}
      VNSTOCK_SYMBOLS_UPCOM: ${VNSTOCK_SYMBOLS_UPCOM:-}
      VNSTOCK_SYMBOLS_DERIVATIVE: ${VNSTOCK_SYMBOLS_DERIVATIVE:-}
      VNSTOCK_SYMBOLS_INDEX: ${VNSTOCK_SYMBOLS_INDEX:-}
      # DNSE OpenAPI WebSocket credentials
      DNSE_API_KEY: ${DNSE_API_KEY:-}
      DNSE_API_SECRET: ${DNSE_API_SECRET:-}
      DNSE_WS_URL: ${DNSE_WS_URL:-wss://ws-openapi.dnse.com.vn}
      WS_ENCODING: ${WS_ENCODING:-json}
      # Polling configuration (ultra-fast mode: 1s during market hours, 60s outside hours)
      POLL_INTERVAL: ${POLL_INTERVAL:-1}
      MAX_WORKERS: ${MAX_WORKERS:-150}
      # Market hours in Vietnam time (UTC+7): 9:00 - 15:00
      MARKET_HOURS_START: ${MARKET_HOURS_START:-9}
      MARKET_HOURS_END: ${MARKET_HOURS_END:-15}
      MARKET_TIMEZONE: ${MARKET_TIMEZONE:-Asia/Ho_Chi_Minh}
      LOG_LEVEL: INFO
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
    restart: unless-stopped
    profiles: [vnstock]

  # ===== VVS FASTAPI BACKEND =====
  vnstock-api:
    build:
      context: ./infra/vnstock-api
    container_name: vnstock-api
    hostname: vnstock-api
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      TRINO_HOST: trino
      TRINO_PORT: 8080
      TRINO_USER: vnstock
      VNSTOCK_SYMBOLS: ${VNSTOCK_SYMBOLS:-VCB,HPG,FPT,VIC,VHM,TCB,MBB,ACB,SSI,VND}
      CORS_ORIGINS: "*"
    ports:
      - "8060:8000"
    depends_on:
      redis:
        condition: service_started
      trino:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 384M
        reservations:
          cpus: "0.10"
          memory: 128M
    restart: unless-stopped
    profiles: [vnstock]

  # ===== VVS FRONTEND (TradingView-style Dashboard) =====
  vnstock-frontend:
    build:
      context: ./infra/vnstock-frontend
    container_name: vnstock-frontend
    hostname: vnstock-frontend
    ports:
      - "3080:80"
    depends_on:
      - vnstock-api
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          cpus: "0.05"
          memory: 64M
    restart: unless-stopped
    profiles: [vnstock]

  # ╔══════════════════════════════════════════════════════════════════╗
  # ║  Core Infrastructure — Shared by all profiles                  ║
  # ╚══════════════════════════════════════════════════════════════════╝

  minio:
    build:
      context: ./infra/minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}   # .env fallback; overridden by Vault at startup
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}   # .env fallback; overridden by Vault
      # Vault — overrides the env-var fallbacks above when vault-init has completed
      # Phase 3: replace VAULT_TOKEN with AppRole secret-id
      VAULT_ADDR: "http://vault:8200"
      VAULT_TOKEN: "dev-root-token"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 512M
    profiles: [airflow, core, tuan, vnstock]

  hive-metastore:
    build:
      context: ./infra/hive-metastore
    environment:
      - HIVE_METASTORE_DB_TYPE=${HIVE_METASTORE_DB_TYPE}
      - HIVE_METASTORE_DB_HOST=${HIVE_METASTORE_DB_HOST}
      - HIVE_METASTORE_DB_NAME=${HIVE_METASTORE_DB_NAME}
      - HIVE_METASTORE_DB_USER=${HIVE_METASTORE_DB_USER}
      - HIVE_METASTORE_DB_PASS=${HIVE_METASTORE_DB_PASS}    # .env fallback; overridden by Vault
      # Vault — overrides the env-var fallback above when vault-init has completed
      # Phase 3: replace VAULT_TOKEN with AppRole secret-id
      - VAULT_ADDR=http://vault:8200
      - VAULT_TOKEN=dev-root-token
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "9083:9083"
    healthcheck:
      test: ["CMD", "pidof", "java"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 512M
    profiles: [core, ranger, tuan, vnstock]

  trino:
    build:
      context: ./infra/trino
    ports:
      - "8080:8080"
    volumes:
      - trino-data:/var/trino/data
    user: "0:0"
    profiles: [core, ranger, trino, tuan, vnstock]
    deploy:
      resources:
        limits:
          cpus: "2.00"
          memory: 4G
        reservations:
          cpus: "1.00"
          memory: 2G

  postgres:
    build:
      context: ./infra/postgres
    hostname: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}   # .env fallback; overridden by Vault at startup
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_MULTIPLE_DATABASES: ${POSTGRES_MULTIPLE_DATABASES:-airflow,datahub,hue,metastore,openmetadata_db,demo, airflow_db}
      POSTGRES_CDC_USER: ${POSTGRES_CDC_USER:-cdc_reader}
      POSTGRES_CDC_PASSWORD: ${POSTGRES_CDC_PASSWORD:-cdc_reader_pwd}  # .env fallback; overridden by Vault
      DATAHUB_DB_NAME: ${DATAHUB_DB_NAME:-datahub}
      # Vault — overrides the env-var fallbacks above when vault-init has completed
      # Phase 3: replace VAULT_TOKEN with AppRole secret-id
      VAULT_ADDR: "http://vault:8200"
      VAULT_TOKEN: "dev-root-token"
    ports:
      - "${POSTGRES_MAPPED_PORT:-15432}:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test:
        ["CMD", "pg_isready", "-U", "${POSTGRES_USER}", "-d", "${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 1536M
        reservations:
          cpus: "0.50"
          memory: 512M
    restart: unless-stopped
    profiles: [core, airflow, hue, datahub, openmetadata, hdfs, tuan, son, vnstock]

  postgres-setup:
    image: acryldata/datahub-postgres-setup:v0.13.1
    build:
      context: ./infra/datahub/postgres-setup
    depends_on:
      postgres:
        condition: service_healthy
    hostname: postgres-setup
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USERNAME=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - DATAHUB_DB_NAME=${DATAHUB_DB_NAME:-datahub}
      - POSTGRES_SERVICE_PORT=5432
    labels:
      datahub_setup_job: true
    networks:
      - default
    profiles: [datahub, tuan]

  datahub-ingestion:
    build:
      context: ./infra/datahub/ingestion
    hostname: datahub-ingestion
    container_name: datahub-ingestion
    depends_on:
      datahub-gms:
        condition: service_healthy
    environment:
      - DATAHUB_GMS_HOST=datahub-gms
      - DATAHUB_GMS_PORT=8080
      - DATAHUB_GMS_PROTOCOL=http
      - DATAHUB_PLUGIN_PATH=/etc/datahub/plugins
    volumes:
      - ./infra/datahub/ingestion/recipes:/recipes:cached
      - ./infra/datahub/ingestion/logs:/logs:cached
      - ${HOME}/.datahub/plugins:/etc/datahub/plugins
      - ./infra/datahub/ingestion/start-ingestions.sh:/start-ingestions.sh:ro
    entrypoint: ["/bin/sh", "/start-ingestions.sh"]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 512M
    profiles: [datahub]

  debezium:
    build:
      context: ./infra/debezium
    hostname: debezium
    container_name: debezium
    environment:
      - BOOTSTRAP_SERVERS=kafka:29092
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - CONNECT_BOOTSTRAP_SERVERS=kafka:29092
      - KAFKA_CONNECT_BOOTSTRAP_SERVERS=kafka:29092
      - GROUP_ID=${DEBEZIUM_GROUP_ID}
      - CONFIG_STORAGE_TOPIC=${DEBEZIUM_CONFIG_STORAGE_TOPIC}
      - OFFSET_STORAGE_TOPIC=${DEBEZIUM_OFFSET_STORAGE_TOPIC}
      - STATUS_STORAGE_TOPIC=${DEBEZIUM_STATUS_STORAGE_TOPIC}
      - POSTGRES_CDC_USER=${POSTGRES_CDC_USER:-cdc_reader}
      - POSTGRES_CDC_PASSWORD=${POSTGRES_CDC_PASSWORD:-cdc_reader_pwd}
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    ports:
      - "8083:8083"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 768M
        reservations:
          cpus: "0.25"
          memory: 256M
    profiles: [core, datahub, tuan, son]

  debezium-ui:
    image: debezium/debezium-ui:latest
    container_name: debezium-ui
    hostname: debezium-ui
    depends_on:
      debezium:
        condition: service_healthy
    environment:
      # Kafka Connect connection configuration
      KAFKA_CONNECT_URIS: http://debezium:8083
    ports:
      - "8096:8080"
    restart: unless-stopped
    profiles: [core, datahub, tuan, son]

  kafka:
    build:
      context: ./infra/kafka
    hostname: kafka
    container_name: kafka
    environment:
      # KRaft Configuration
      KAFKA_CFG_NODE_ID: ${KAFKA_NODE_ID:-1}
      KAFKA_CFG_PROCESS_ROLES: ${KAFKA_PROCESS_ROLES:-controller,broker}
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: ${KAFKA_CONTROLLER_QUORUM_VOTERS:-1@kafka:9093}

      # Listeners - expose both internal and external
      KAFKA_CFG_LISTENERS: INTERNAL://:29092,EXTERNAL://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://${KEYCLOAK_HOST:-localhost}:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: INTERNAL

      # Replication settings (single broker)
      KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_CFG_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_CFG_MIN_INSYNC_REPLICAS: 1

      # FIX: Tăng message size limits
      KAFKA_CFG_MESSAGE_MAX_BYTES: 10485760 # 10MB
      KAFKA_CFG_REPLICA_FETCH_MAX_BYTES: 10485760 # 10MB
      KAFKA_CFG_MAX_REQUEST_SIZE: 10485760 # 10MB
      KAFKA_CFG_SOCKET_REQUEST_MAX_BYTES: 104857600 # 100MB (keep this high)

      # Auto create topics
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: ${KAFKA_AUTO_CREATE_TOPICS_ENABLE:-true}

      # Retention
      KAFKA_CFG_LOG_RETENTION_HOURS: 168

      # Performance tuning
      KAFKA_CFG_NUM_NETWORK_THREADS: 3
      KAFKA_CFG_NUM_IO_THREADS: 8
      KAFKA_CFG_SOCKET_SEND_BUFFER_BYTES: 102400
      KAFKA_CFG_SOCKET_RECEIVE_BUFFER_BYTES: 102400

      # JVM Heap
      KAFKA_HEAP_OPTS: "-Xms512m -Xmx1024m"

    ports:
      - "9092:9092" # External access
      - "29092:29092" # Internal access (DataHub)

    volumes:
      - kafka-data:/bitnami/kafka

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "kafka-broker-api-versions.sh --bootstrap-server localhost:29092 || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 1536M
        reservations:
          cpus: "0.50"
          memory: 768M
    restart: unless-stopped
    networks:
      - default
    profiles: [core, datahub, hdfs, tuan, son, vnstock]

  # Kafka setup cho DataHub topics
  kafka-setup:
    depends_on:
      kafka:
        condition: service_healthy
    hostname: kafka-setup
    build:
      context: ./infra/datahub/kafka-setup
    environment:
      - DATAHUB_PRECREATE_TOPICS=${DATAHUB_PRECREATE_TOPICS:-false}
      - KAFKA_BOOTSTRAP_SERVER=kafka:29092
      # No KAFKA_ZOOKEEPER_CONNECT needed since we use KRaft
    labels:
      datahub_setup_job: true
    profiles: [datahub, tuan]

  schema-registry:
    build:
      context: ./infra/schema-registry
    depends_on:
      kafka:
        condition: service_healthy
    hostname: schema-registry
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081

      # FIX: Use internal Kafka port
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_KAFKASTORE_SECURITY_PROTOCOL: PLAINTEXT

      # Topic settings
      SCHEMA_REGISTRY_KAFKASTORE_TOPIC: _schemas
      SCHEMA_REGISTRY_KAFKASTORE_TOPIC_REPLICATION_FACTOR: 1

      # Schema Registry group
      SCHEMA_REGISTRY_SCHEMA_REGISTRY_GROUP_ID: schema-registry

      # Debugging
      SCHEMA_REGISTRY_DEBUG: "false"

    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 384M
        reservations:
          cpus: "0.10"
          memory: 192M
    profiles: [core, datahub, tuan, son, vnstock]

  data-generator:
    build:
      context: ./infra/data-generator
    environment:
      KAFKA_BOOTSTRAP: ${KAFKA_BOOTSTRAP:-kafka:9092}
      SCHEMA_REGISTRY_URL: ${SCHEMA_REGISTRY_URL:-http://schema-registry:8081}
      PG_DSN: ${PG_DSN:-host=postgres port=5432 dbname=demo user=admin password=admin}
      RATE_MPS: ${DATA_GEN_RATE_MPS:-40}
      SEED_USERS: ${DATA_GEN_SEED_USERS:-500}
      SEED_PRODUCTS: ${DATA_GEN_SEED_PRODUCTS:-200}
      SEED_WAREHOUSES: ${DATA_GEN_SEED_WAREHOUSES:-5}
      SEED_SUPPLIERS: ${DATA_GEN_SEED_SUPPLIERS:-20}
      P_CUSTOMER_INTERACTION: ${DATA_GEN_P_CUSTOMER_INTERACTION:-0.8}
      P_INVENTORY_EVENT: ${DATA_GEN_P_INVENTORY_EVENT:-0.3}
      TOPIC_ORDERS: ${DATA_GEN_TOPIC_ORDERS:-orders.v1}
      TOPIC_PAYMENTS: ${DATA_GEN_TOPIC_PAYMENTS:-payments.v1}
      TOPIC_SHIPMENTS: ${DATA_GEN_TOPIC_SHIPMENTS:-shipments.v1}
      TOPIC_INVENTORY_CHANGES: ${DATA_GEN_TOPIC_INVENTORY_CHANGES:-inventory-changes.v1}
      TOPIC_CUSTOMER_INTERACTIONS: ${DATA_GEN_TOPIC_CUSTOMER_INTERACTIONS:-customer-interactions.v1}
    #depends_on:
    #  postgres:
    #    condition: service_healthy
    #  kafka:
    #    condition: service_healthy
    #  schema-registry:
    #    condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import psycopg2, os; from confluent_kafka.schema_registry import SchemaRegistryClient; pg_dsn = os.getenv('PG_DSN', 'host=postgres port=5432 dbname=demo user=admin password=admin'); sr_url = os.getenv('SCHEMA_REGISTRY_URL', 'http://schema-registry:8081'); conn = psycopg2.connect(pg_dsn); conn.close(); sr = SchemaRegistryClient({'url': sr_url}); sr.get_subjects(); print('Dependencies healthy')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 384M
        reservations:
          cpus: "0.10"
          memory: 192M
    profiles: [datagen]

  kafka-ui:
    build:
      context: ./infra/kafka-ui
    environment:
      KAFKA_CLUSTERS_0_NAME: local-kafka
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092 # FIX: Use internal port
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8081
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    ports:
      - "8082:8080"
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 384M
        reservations:
          cpus: "0.10"
          memory: 192M
    profiles: [core, tuan]

  spark-master:
    build:
      context: ./infra/spark
    environment:
      - SPARK_MODE=${SPARK_MASTER_MODE}
      - SPARK_MASTER_HOST=spark-master
      - SPARK_PUBLIC_DNS=localhost
      - AWS_REGION=us-east-1
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
      - AWS_JAVA_V1_DISABLE_DEPRECATION_ANNOUNCEMENT=true
      - DNSE_API_KEY=${DNSE_API_KEY:-}
    ports:
      - "7077:7077"
      - "8088:8080"
      - "4040:4040"
    extra_hosts:
